packages:
  - packages/*
  - internals/*
  - examples/*
  - tests/**

allowBuilds:
  cypress: true
  es5-ext: true
  esbuild: true
  msw: true
  vue-demi: true

catalog:
  '@kubb/adapter-oas': 5.0.0-beta.39
  '@kubb/agent': 5.0.0-beta.39
  '@kubb/core': 5.0.0-beta.39
  '@kubb/middleware-barrel': 5.0.0-beta.39
  '@kubb/parser-ts': 5.0.0-beta.39
  '@kubb/renderer-jsx': 5.0.0-beta.39
  '@size-limit/file': ^12.1.0
  '@types/node': ^22.19.19
  '@types/react': ^19.2.16
  '@vitest/coverage-v8': ^4.1.7
  '@vitest/ui': ^4.1.7
  kubb: 5.0.0-beta.39
  oxfmt: ^0.47.0
  oxlint: ^1.67.0
  prettier: ^3.8.3
  remeda: ^2.37.0
  'size-limit': ^12.1.0
  tsdown: ^0.22.1
  typescript: ^6.0.3
  unplugin-kubb: 5.0.0-beta.39
  vitest: ^4.1.7

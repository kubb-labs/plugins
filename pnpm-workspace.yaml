minimumReleaseAge: 4320 # 72 hours, matches .npmrc min-package-age
minimumReleaseAgeExclude:
  - '@kubb/*'
  - 'kubb'
  - 'unplugin-kubb'
  - '@types/*'
  - '@clack/core'
pmOnFail: warn
resolutionMode: highest

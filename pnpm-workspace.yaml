packages:
  - packages/*
  - internals/*
  - examples/*
  - tests/**

allowBuilds:
  cypress: true
  es5-ext: true
  esbuild: true
  msw: true
  vue-demi: true

catalog:
  '@kubb/adapter-oas': 5.0.0-beta.22
  '@kubb/agent': 5.0.0-beta.22
  '@kubb/core': 5.0.0-beta.22
  '@kubb/middleware-barrel': 5.0.0-beta.22
  '@kubb/parser-ts': 5.0.0-beta.22
  '@kubb/renderer-jsx': 5.0.0-beta.22
  '@size-limit/file': ^12.1.0
  '@types/node': ^22.19.19
  '@types/react': ^19.2.14
  '@vitest/coverage-v8': ^4.1.6
  '@vitest/ui': ^4.1.6
  kubb: 5.0.0-beta.22
  oxfmt: ^0.47.0
  oxlint: ^1.65.0
  prettier: ^3.8.3
  remeda: ^2.34.1
  'size-limit': ^12.1.0
  tsdown: ^0.22.0
  typescript: ^6.0.3
  unplugin-kubb: 5.0.0-beta.22
  vitest: ^4.1.6

minimumReleaseAge: 4320 # 72 hours, matches .npmrc min-package-age
minimumReleaseAgeExclude:
  - '@kubb/*'
  - 'kubb'
  - 'unplugin-kubb'
  - '@types/*'
pmOnFail: warn
resolutionMode: highest

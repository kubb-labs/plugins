  '@kubb/agent': 5.0.0-beta.4
  '@kubb/core': 5.0.0-beta.4
  '@kubb/middleware-barrel': 5.0.0-beta.4
  '@kubb/parser-ts': 5.0.0-beta.4
  '@kubb/renderer-jsx': 5.0.0-beta.4
  kubb: 5.0.0-beta.4
  unplugin-kubb: 5.0.0-beta.4
  '@types/node': ^22.19.17
  prettier: ^3.8.3
  '@types/react': ^19.2.14
  '@size-limit/file': ^12.1.0
  'size-limit': ^12.1.0
  remeda: ^2.34.0
  tsdown: ^0.21.10
  typescript: ^6.0.3
  vitest: ^4.1.5
  '@vitest/coverage-v8': ^4.1.5
  '@vitest/ui': ^4.1.5
  oxfmt: ^0.47.0
  oxlint: ^1.63.0

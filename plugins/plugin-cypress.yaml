$schema: 'https://kubb.dev/schemas/extension.json'
id: plugin-cypress
name: Cypress
description: Generate Cypress end-to-end tests from OpenAPI specifications.
category: testing
type: official
npmPackage: '@kubb/plugin-cypress'
docsPath: /plugins/plugin-cypress
repo: https://github.com/kubb-labs/plugins
codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/cypress
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - cypress
  - e2e-testing
  - api-testing
  - test-generation
  - codegen
  - openapi
dependencies:
  - plugin-ts
resources:
  documentation: https://kubb.dev/plugins/plugin-cypress
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-cypress/CHANGELOG.md
featured: false
icon:
  light: 'https://kubb.dev/feature/cypress.svg'

intro: |
  # @kubb/plugin-cypress

  Generate typed `cy.request()` wrappers from your OpenAPI schema. Each API operation becomes a reusable function you can call in Cypress tests, with full TypeScript support.

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'cypress', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'cypress'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - extends: ./_shared/core/resolver.yaml
    type: 'Partial<ResolverCypress> & ThisType<ResolverCypress>'

  - extends: ./_shared/client/params-type.yaml
  - extends: ./_shared/client/params-casing.yaml
  - extends: ./_shared/client/path-params-type.yaml
  - extends: ./_shared/client/data-return-type.yaml
  - extends: ./_shared/client/base-url.yaml

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: "(ctx) => `${ctx.group}Requests`"
        description: Return the name of a group based on the group name. This is used for file and identifier generation.

  - extends: ./_shared/core/include.yaml
  - extends: ./_shared/core/exclude.yaml
  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: 'Array<Generator<PluginCypress>>'

  - extends: ./_shared/core/transformer.yaml
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginTs } from '@kubb/plugin-ts'
          import { pluginCypress } from '@kubb/plugin-cypress'

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs(),
              pluginCypress({
                output: {
                  path: './cypress',
                  barrelType: 'named',
                  banner: '/* eslint-disable no-alert, no-console */',
                },
                group: {
                  type: 'tag',
                  name: ({ group }) => `${group}Requests`,
                },
              }),
            ],
          })
        twoslash: false

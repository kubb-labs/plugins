$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json'
id: plugin-ts
name: TypeScript
description: Generate TypeScript types and interfaces from OpenAPI schemas with type-safe representations.
category: types
type: official
version: 5.0.0-alpha.51
npmPackage: '@kubb/plugin-ts'
docsPath: /plugins/plugin-ts
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - typescript
  - types
  - interfaces
  - codegen
  - openapi
dependencies: []
resources:
  documentation: https://kubb.dev/plugins/plugin-ts
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-ts/CHANGELOG.md
featured: true
iconLight: 'https://kubb.dev/feature/typescript.svg'
skills: []
options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'types', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - name: path
        type: string
        required: true
        description: Output directory for generated files, relative to the global output path.
      - name: barrelType
        type: "'all' | 'named' | 'propagate' | false"
        required: false
        default: "'named'"
        description: Controls how index.ts barrel files are generated.
  - name: group
    type: Group
    required: false
    description: Group the generated types based on the provided name (e.g. by tag).
  - name: exclude
    type: 'Array<Exclude>'
    required: false
    description: Array containing exclude parameters to skip tags/operations/methods/paths.
  - name: include
    type: 'Array<Include>'
    required: false
    description: Array containing include parameters to include tags/operations/methods/paths.
  - name: override
    type: 'Array<Override>'
    required: false
    description: Array containing override parameters to override options based on tags/operations/methods/paths.
  - name: syntaxType
    type: "'type' | 'interface'"
    required: false
    default: "'type'"
    description: Switch between type alias or interface for creating TypeScript types.
    values:
      - name: "'type'"
        description: Generates TypeScript type aliases.
        example: |
          export type Pet = {
            id: number
            name: string
            status?: 'available' | 'pending' | 'sold'
          }
      - name: "'interface'"
        description: Generates TypeScript interfaces.
        example: |
          export interface Pet {
            id: number
            name: string
            status?: 'available' | 'pending' | 'sold'
          }
  - name: optionalType
    type: "'questionToken' | 'undefined' | 'questionTokenAndUndefined'"
    required: false
    default: "'questionToken'"
    description: Choose what to use as mode for an optional value.
    values:
      - name: "'questionToken'"
        description: Marks optional properties with `?`.
        example: |
          export type Pet = {
            name?: string
            tag?: string
          }
      - name: "'undefined'"
        description: Adds `| undefined` to the type of optional properties.
        example: |
          export type Pet = {
            name: string | undefined
            tag: string | undefined
          }
      - name: "'questionTokenAndUndefined'"
        description: Combines both `?` and `| undefined` for optional properties.
        example: |
          export type Pet = {
            name?: string | undefined
            tag?: string | undefined
          }
  - name: arrayType
    type: "'generic' | 'array'"
    required: false
    default: "'array'"
    description: 'Choose between Array<string> or string[] for array types.'
    values:
      - name: "'generic'"
        description: Uses the generic `Array<T>` syntax.
        example: |
          export type Pets = Array<Pet>
      - name: "'array'"
        description: Uses the shorthand `T[]` syntax.
        example: |
          export type Pets = Pet[]
  - name: enumType
    type: "'asConst' | 'asPascalConst' | 'enum' | 'constEnum' | 'literal' | 'inlineLiteral'"
    required: false
    default: "'asConst'"
    description: Choose how enums are generated. asConst/asPascalConst emit const objects, enum/constEnum emit TypeScript enums, literal/inlineLiteral emit union literals.
    tip: Prefer `'asConst'` or `'literal'` for better tree-shaking compared to TypeScript `enum`.
    values:
      - name: "'asConst'"
        description: Emits a camelCase `as const` object with a companion union type.
        example: |
          export const petStatus = {
            available: 'available',
            pending: 'pending',
            sold: 'sold',
          } as const
          export type PetStatus = (typeof petStatus)[keyof typeof petStatus]
      - name: "'asPascalConst'"
        description: Emits a PascalCase-keyed `as const` object with a companion union type.
        example: |
          export const PetStatus = {
            Available: 'available',
            Pending: 'pending',
            Sold: 'sold',
          } as const
          export type PetStatusType = (typeof PetStatus)[keyof typeof PetStatus]
      - name: "'enum'"
        description: Emits a standard TypeScript `enum`.
        example: |
          export enum PetStatus {
            available = 'available',
            pending = 'pending',
            sold = 'sold',
          }
      - name: "'constEnum'"
        description: Emits a `const enum` (inlined by the TypeScript compiler).
        example: |
          export const enum PetStatus {
            available = 'available',
            pending = 'pending',
            sold = 'sold',
          }
      - name: "'literal'"
        description: Emits a union of string literals as a named type alias.
        example: |
          export type PetStatus = 'available' | 'pending' | 'sold'
      - name: "'inlineLiteral'"
        description: Inlines the union of string literals directly into the parent type without a separate alias.
        example: |
          export type Pet = {
            status: 'available' | 'pending' | 'sold'
          }
  - name: enumTypeSuffix
    type: string
    required: false
    default: "'Key'"
    description: Suffix appended to the generated type alias name for asConst/asPascalConst enum types.
  - name: enumKeyCasing
    type: "'screamingSnakeCase' | 'snakeCase' | 'pascalCase' | 'camelCase' | 'none'"
    required: false
    default: "'none'"
    description: Choose the casing for enum key names. Only applies to asConst, asPascalConst, enum, and constEnum types.
    values:
      - name: "'screamingSnakeCase'"
        description: Converts enum keys to SCREAMING_SNAKE_CASE.
        example: |
          export const petStatus = {
            AVAILABLE: 'available',
            PENDING_REVIEW: 'pendingReview',
          } as const
      - name: "'snakeCase'"
        description: Converts enum keys to snake_case.
        example: |
          export const petStatus = {
            available: 'available',
            pending_review: 'pendingReview',
          } as const
      - name: "'pascalCase'"
        description: Converts enum keys to PascalCase.
        example: |
          export const petStatus = {
            Available: 'available',
            PendingReview: 'pendingReview',
          } as const
      - name: "'camelCase'"
        description: Converts enum keys to camelCase.
        example: |
          export const petStatus = {
            available: 'available',
            pendingReview: 'pendingReview',
          } as const
      - name: "'none'"
        description: Keeps enum keys exactly as they appear in the OpenAPI schema.
        example: |
          export const petStatus = {
            available: 'available',
            'pending-review': 'pending-review',
          } as const
  - name: contentType
    type: "'application/json' | string"
    required: false
    description: Define which contentType should be used. By default uses the first valid JSON media type.
  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform parameter names to camelCase for path, query, and header params.
  - name: generators
    type: 'Array<Generator<PluginTs>>'
    required: false
    description: Define additional generators next to the TypeScript generators.
  - name: resolver
    type: 'Partial<ResolverTs>'
    required: false
    description: Override individual resolver methods to customize naming conventions.
  - name: transformer
    type: ast.Visitor
    required: false
    description: AST visitor applied to each schema/operation node before printing.
  - name: printer
    type: '{ nodes?: PrinterTsNodes }'
    required: false
    description: Override individual printer node handlers to customize rendering of specific schema types.
fullExample: |
  import { defineConfig } from 'kubb'
  import { adapterOas } from '@kubb/adapter-oas'
  import { pluginTs } from '@kubb/plugin-ts'

  export default defineConfig({
    input: { path: './petStore.yaml' },
    output: { path: './src/gen' },
    plugins: [
      pluginTs({
        output: { path: 'types', barrelType: 'named' },
        syntaxType: 'type',
        enumType: 'asConst',
        enumKeyCasing: 'none',
        optionalType: 'questionToken',
        arrayType: 'array',
        paramsCasing: 'camelcase',
      }),
    ],
  })

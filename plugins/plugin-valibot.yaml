$schema: "https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json"
id: plugin-valibot
name: Valibot
description: Generate Valibot validation schemas from OpenAPI specifications for runtime data validation.
category: validation
type: official
npmPackage: "@kubb/plugin-valibot"
docsPath: /plugins/plugin-valibot
repo: https://github.com/kubb-labs/plugins
codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/valibot
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: ">=5.0.0"
  node: ">=22"
tags:
  - valibot
  - validation
  - schema
  - runtime-validation
  - codegen
  - openapi
dependencies: []
resources:
  documentation: https://kubb.dev/plugins/plugin-valibot
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-valibot/CHANGELOG.md
featured: true

intro: |
  # @kubb/plugin-valibot

  Generate [Valibot](https://valibot.dev/) validation schemas from your OpenAPI schema.

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'valibot', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'valibot'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - extends: ./_shared/core/resolver.yaml
    type: "Partial<ResolverValibot> & ThisType<ResolverValibot>"

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: "(context: GroupContext) => string"
        required: false
        default: "(ctx) => `${ctx.group}Controller`"
        description: Return the name of a group based on the group name. Used for the file and identifier generation.

  - name: importPath
    type: string
    required: false
    default: "'valibot'"
    description: Path to the Valibot package used in generated import statements. Accepts a package name or a relative path.

  - name: typed
    type: boolean
    required: false
    default: "false"
    description: Annotate each generated schema with its inferred TypeScript type, using `@kubb/plugin-ts` output as the source. Requires `@kubb/plugin-ts` to be configured in the same `plugins` array.

  - name: inferred
    type: boolean
    required: false
    default: "false"
    description: Export a `v.InferOutput<typeof schema>` type alias alongside each generated schema. This gives you a TypeScript type that stays in sync with the schema's runtime validation.
    codeBlock:
      lang: typescript
      title: "inferred: true"
      code: |
        import * as v from 'valibot'

        export const petSchema = v.object({
          name: v.string(),
          status: v.optional(v.picklist(['available', 'pending', 'sold'])),
        })

        export type Pet = v.InferOutput<typeof petSchema>

  - name: dateType
    type: "false | 'string' | 'stringOffset' | 'stringLocal' | 'date'"
    required: false
    default: "'string'"
    description: Choose to use `date` or `datetime` as JavaScript `Date` instead of `string`.

  - name: coercion
    type: "boolean | { dates?: boolean, strings?: boolean, numbers?: boolean }"
    required: false
    default: "false"
    description: Configure coercion behavior for generated schemas.

  - name: optionalType
    type: "'optional' | 'exactOptional' | 'undefinedable'"
    required: false
    default: "'optional'"
    description: |
      Choose how optional OpenAPI properties are represented in Valibot.

      Use `'exactOptional'` to align with TypeScript's `exactOptionalPropertyTypes`, or `'undefinedable'` when a key should exist while accepting `undefined`.
    examples:
      - name: "'exactOptional'"
        files:
          - lang: typescript
            code: |
              v.exactOptional(v.string())
            twoslash: false
      - name: "'undefinedable'"
        files:
          - lang: typescript
            code: |
              v.undefinedable(v.string())
            twoslash: false

  - name: defaultMode
    type: "'fallback' | 'default'"
    required: false
    default: "'default'"
    description: |
      Control how non-optional OpenAPI default values are emitted. `'default'` keeps defaults only on optional entries and does not add a fallback to required schemas. `'fallback'` uses `v.fallback(schema, value)` for invalid inputs.

  - name: metadata
    type: "boolean | { title?: boolean; description?: boolean; examples?: boolean; extensions?: boolean }"
    required: false
    default: "{ description: true }"
    description: |
      Attach OpenAPI metadata to generated schemas with Valibot metadata actions like `v.title`, `v.description`, `v.examples`, and `v.metadata` for vendor extensions.

  - name: readonly
    type: boolean
    required: false
    default: "false"
    description: "Emit `v.readonly()` for schemas marked with OpenAPI `readOnly: true`."

  - name: operations
    type: boolean
    required: false
    default: "false"
    description: Generate a combined `operations.ts` file that exports all operation-level schemas grouped by `operationId`.

  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform property names in path, query, and header parameter types to camelCase.

  - name: guidType
    type: "'uuid' | 'guid'"
    required: false
    default: "'uuid'"
    description: "Validator to use for OpenAPI properties with `format: uuid`."

  - extends: ./_shared/core/include.yaml
  - extends: ./_shared/core/exclude.yaml
  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: "Array<Generator<PluginValibot>>"

  - extends: ./_shared/core/transformer.yaml

  - name: printer
    type: "{ nodes?: PrinterValibotNodes }"
    required: false
    description: |
      Override individual printer node handlers to customize how specific schema types are rendered.

      Each key is a `SchemaType` (e.g. `'integer'`, `'date'`). The function you provide replaces the built-in handler for that type. Use `this.transform` to recurse into nested schema nodes.
    examples:
      - name: Override integer to v.number()
        files:
          - lang: typescript
            code: |
              import { pluginValibot } from '@kubb/plugin-valibot'

              pluginValibot({
                printer: {
                  nodes: {
                    integer() {
                      return 'v.number()'
                    },
                  },
                },
              })
            twoslash: false

  - name: wrapOutput
    type: "(arg: { output: string; schema: SchemaNode }) => string | undefined"
    required: false
    description: Wrap the generated Valibot schema string with additional validation or metadata.

examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb';
          import { pluginTs } from '@kubb/plugin-ts';
          import { pluginValibot } from '@kubb/plugin-valibot';

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs(),
              pluginValibot({
                output: {
                  path: './valibot',
                },
                group: { type: 'tag', name: ({ group }) => `${group}Schemas` },
                typed: true,
                importPath: 'valibot',
              }),
            ],
          });
        twoslash: false

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json'
id: plugin-redoc
name: Redoc
description: Generate beautiful, interactive API documentation using Redoc from OpenAPI specifications.
category: documentation
type: official
version: 5.0.0-alpha.51
npmPackage: '@kubb/plugin-redoc'
docsPath: /plugins/plugin-redoc
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - redoc
  - api-docs
  - documentation
  - interactive-docs
  - codegen
  - openapi
dependencies: []
resources:
  documentation: https://kubb.dev/plugins/plugin-redoc
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-redoc/CHANGELOG.md
featured: false
icon:
  light: 'https://kubb.dev/feature/openapi.svg'
intro: |
  Generate API documentation using [Redoc](https://redocly.com/).
options:
  - name: output
    type: '{ path: string }'
    required: false
    description: Specify the output path for the generated documentation HTML file.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'docs.html'"
        description: |
          The output location for the generated documentation.

          This plugin uses [Redocly](https://redocly.com/) for HTML generation.
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginRedoc } from '@kubb/plugin-redoc'

          export default defineConfig({
            input: { path: './petStore.yaml' },
            output: { path: './src/gen' },
            plugins: [
              pluginRedoc({
                output: { path: 'docs.html' },
              }),
            ],
          })
        twoslash: true

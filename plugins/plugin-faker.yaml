$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json'
id: plugin-faker
name: Faker
description: Generate realistic mock data using Faker.js from OpenAPI specifications for development and testing.
category: mocks
type: official
npmPackage: '@kubb/plugin-faker'
docsPath: /plugins/plugin-faker
repo: https://github.com/kubb-labs/plugins
codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/faker
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - faker
  - mock-data
  - mocks
  - fixtures
  - testing
  - codegen
  - openapi
dependencies:
  - plugin-ts
resources:
  documentation: https://kubb.dev/plugins/plugin-faker
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-faker/CHANGELOG.md
featured: false
icon:
  light: 'https://kubb.dev/feature/faker.svg'

intro: |
  # @kubb/plugin-faker

  Generate mock data helpers with [Faker](https://fakerjs.dev/).

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'mocks', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'mocks'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: "(ctx) => `${ctx.group}Controller`"
        description: Return the name of a group based on the group name. This is used for file and helper name generation.

  - name: dateParser
    type: "'faker' | 'dayjs' | 'moment' | string"
    required: false
    default: "'faker'"
    description: Choose which formatter to use when `date`, `time`, or `datetime` schema nodes are represented as strings.
    tip: |
      You can use another library that exposes a default export. Kubb adds the import automatically.
    examples:
      - name: "'faker'"
        files:
          - lang: ts
            code: |
              faker.date.anytime().toISOString().substring(0, 10)
      - name: "'dayjs'"
        files:
          - lang: ts
            code: |
              dayjs(faker.date.anytime()).format('YYYY-MM-DD')
      - name: "'moment'"
        files:
          - lang: ts
            code: |
              moment(faker.date.anytime()).format('YYYY-MM-DD')

  - name: mapper
    type: 'Record<string, string>'
    required: false
    description: Override individual object properties with custom faker expressions.

  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform path, query, and header parameter property names in generated mocks.
    important: |
      Use the same `paramsCasing` value in `@kubb/plugin-ts` so the generated mock objects stay compatible with the generated types.

  - name: regexGenerator
    type: "'faker' | 'randexp'"
    required: false
    default: "'faker'"
    description: Choose which generator to use for regex-backed string schemas.
    examples:
      - name: "'faker'"
        files:
          - lang: ts
            code: |
              faker.helpers.fromRegExp('^[A-Z]+$')
      - name: "'randexp'"
        files:
          - lang: ts
            code: |
              new RandExp(/^[A-Z]+$/).gen()

  - name: seed
    type: 'number | number[]'
    required: false
    description: Seed faker for deterministic output.

  - extends: ./_shared/core/include.yaml

  - extends: ./_shared/core/exclude.yaml

  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: 'Array<Generator<PluginFaker>>'

  - name: resolver
    type: 'Partial<ResolverFaker>'
    required: false
    description: Customize helper naming on top of the active compatibility preset.
    codeBlock:
      lang: typescript
      code: |
        pluginFaker({
          resolver: {
            resolveName(name) {
              return `${this.default(name)}Mock`
            },
          },
        })

  - name: transformer
    type: ast.Visitor
    required: false
    description: Apply a single AST visitor before the faker helpers are rendered.
    codeBlock:
      lang: typescript
      code: |
        pluginFaker({
          transformer: {
            schema(node) {
              return { ...node, description: undefined }
            },
          },
        })

  - name: printer
    type: '{ nodes?: PrinterFakerNodes }'
    required: false
    description: |
      Override individual printer node handlers to customize how specific schema types are rendered.

      Each key is a `SchemaType` (for example `'integer'`, `'date'`, or `'ref'`). The function you provide replaces the built-in handler for that type. Use `this.transform` to recurse into nested schema nodes and `this.options` to read printer options.
    examples:
      - name: Override integer to float()
        files:
          - lang: typescript
            code: |
              import { pluginFaker } from '@kubb/plugin-faker'

              pluginFaker({
                printer: {
                  nodes: {
                    integer() {
                      return 'faker.number.float()'
                    },
                  },
                },
              })
            twoslash: false
      - name: Override date strings
        files:
          - lang: typescript
            code: |
              import { pluginFaker } from '@kubb/plugin-faker'

              pluginFaker({
                printer: {
                  nodes: {
                    date(node) {
                      if (node.representation === 'string') {
                        return 'new Date().toISOString().substring(0, 10)'
                      }

                      return 'new Date()'
                    },
                  },
                },
              })
            twoslash: false
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginFaker } from '@kubb/plugin-faker'
          import { pluginTs } from '@kubb/plugin-ts'

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs({
                output: {
                  path: './types',
                },
              }),
              pluginFaker({
                output: {
                  path: './mocks',
                  barrelType: 'named',
                },
                seed: [100],
                paramsCasing: 'camelcase',
              }),
            ],
          })
        twoslash: false

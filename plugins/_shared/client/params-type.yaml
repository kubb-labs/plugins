# Shared option: client/params-type

# ────────────────────────── client.paramsType ──────────────────────────
$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json#plugin-options'
name: paramsType
type: "'object' | 'inline'"
required: false
default: "'inline'"
description: Defines how parameters are passed to generated functions. Switch between object-style parameters and inline parameters.
tip: |
  When `paramsType` is set to `'object'`, `pathParams` will also be set to `'object'`.
body: |
  - `'object'` returns params and pathParams as an object.
  - `'inline'` returns params as comma-separated params.
examples:
  - name: object
    files:
      - lang: typescript
        code: |
          export async function deletePet(
            {
              petId,
              headers,
            }: {
              petId: DeletePetPathParams['petId']
              headers?: DeletePetHeaderParams
            },
            config: Partial<RequestConfig> = {},
          ) {
            ...
          }
        twoslash: false
  - name: inline
    files:
      - lang: typescript
        code: |
          export async function deletePet(
            petId: DeletePetPathParams['petId'],
            headers?: DeletePetHeaderParams,
            config: Partial<RequestConfig> = {}
          ){
            ...
          }
        twoslash: false

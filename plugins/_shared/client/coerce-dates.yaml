# Shared option: client/coerce-dates

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json#plugin-options'
name: coerceDates
type: boolean
required: false
default: 'false'
description: |
  Convert date values at runtime so they match the `Date` types generated by `@kubb/plugin-ts`. Requires the OpenAPI adapter to run with `dateType: 'date'`.

  Without this, a `format: date-time` field is typed as `Date` but the value returned by the client is still a `string`. With `coerceDates: true`, Kubb generates a transformer per schema and applies it inside every operation:

  - **Responses** — ISO `string` → `Date` (via `new Date(value)`).
  - **Request bodies** — `Date` → ISO `string` (`date` → `YYYY-MM-DD`, `time` → `HH:mm:ss`, `date-time` → full ISO).

  Detection is schema-driven: only fields actually typed as a date are converted, including nested objects, arrays, and `$ref`s. The behavior is independent of `parser` — `'client'` and `'zod'` produce the same result.
examples:
  - name: Coerce dates in the generated client
    files:
      - lang: typescript
        twoslash: false
        code: |
          import { adapterOas } from '@kubb/adapter-oas'
          import { defineConfig } from 'kubb'
          import { pluginClient } from '@kubb/plugin-client'
          import { pluginTs } from '@kubb/plugin-ts'

          export default defineConfig({
            input: { path: './petStore.yaml' },
            output: { path: './src/gen' },
            adapter: adapterOas({ dateType: 'date' }),
            plugins: [
              pluginTs(),
              pluginClient({
                coerceDates: true,
              }),
            ],
          })

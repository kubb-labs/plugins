# Shared option: client/data-return-type

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json#plugin-options'
name: dataReturnType
type: "'data' | 'full'"
required: false
default: "'data'"
description: |
  Shape of the value returned from each generated client function.

  - `'data'` returns only the response body (`response.data`).
  - `'full'` returns a discriminated union keyed by HTTP status code. Each member is `{ status: N; data: StatusNType; statusText: string }`. Narrowing on `res.status` also narrows `res.data` to the matching response type.

  With the default `throwOnError: true` the union only contains success (2xx) members, since error responses throw. Set `throwOnError: false` on `@kubb/plugin-client` to resolve and narrow every documented status.
examples:
  - name: "'data' (default)"
    files:
      - name: getPetById.ts
        lang: typescript
        twoslash: false
        code: |
          export async function getPetById<TData>(
            petId: GetPetByIdPathParams,
          ): Promise<ResponseConfig<TData>['data']> {
            // ...
          }
      - name: usage.ts
        lang: typescript
        twoslash: false
        code: |
          const pet = await getPetById(1)
          //    ^? Pet
  - name: "'full' with throwOnError: false"
    files:
      - name: addPet.ts
        lang: typescript
        twoslash: false
        code: |
          export async function addPet(data: AddPetData, config = {}) {
            const res = await request<AddPetStatus200 | AddPetStatus405, ...>(...)
            return res as
              | { status: 200; data: AddPetStatus200; statusText: string }
              | { status: 405; data: AddPetStatus405; statusText: string }
          }
      - name: usage.ts
        lang: typescript
        twoslash: false
        code: |
          const res = await addPet(petData)
          if (res.status === 405) {
            res.data // narrowed to AddPetStatus405
          }

# Shared option: client/path-params-type

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json#plugin-options'
name: pathParamsType
type: "'object' | 'inline'"
required: false
default: "'inline'"
description: |
  How URL path parameters appear in the generated function signature. Affects only path params; query/header params follow `paramsType`.

  - `'inline'` (default) — each path param is a positional argument: `getPetById(petId)`.
  - `'object'` — path params are wrapped in a single object: `getPetById({ petId })`.
examples:
  - name: "'inline' (default)"
    files:
      - lang: typescript
        twoslash: false
        code: |
          export async function getPetById(
            petId: GetPetByIdPathParams,
          ) {
            // ...
          }
  - name: "'object'"
    files:
      - lang: typescript
        twoslash: false
        code: |
          export async function getPetById(
            { petId }: GetPetByIdPathParams,
          ) {
            // ...
          }

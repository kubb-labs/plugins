# Shared option: core/group-type

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json#plugin-options'
name: type
type: "'tag'"
required: true
description: Specify the property to group files by. Required when `group` is defined.
note: |
  `Required: true*` means this is required only when the `group` option is used. The `group` option itself is optional.
body: |
  - `'tag'`: Uses the first tag from `operation.getTags().at(0)?.name`

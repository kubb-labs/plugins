$schema: 'https://kubb.dev/schemas/extension.json'
kind: plugin
id: plugin-client
name: Client
description: Generate type-safe HTTP clients (Axios, Fetch) from OpenAPI specifications for making API requests.
category: client
type: official
npmPackage: '@kubb/plugin-client'
docsPath: /plugins/plugin-client
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - api-client
  - axios
  - fetch
  - http-client
  - codegen
  - openapi
dependencies:
  - plugin-ts
resources:
  documentation: https://kubb.dev/plugins/plugin-client
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-client/CHANGELOG.md
  codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/client
featured: true
icon:
  light: 'https://kubb.dev/feature/axios.svg'

intro: |
  # @kubb/plugin-client

  Generate API client code for handling API requests.

  By default, this plugin uses [Axios](https://axios-http.com/docs/intro), but you can add your own client. See [Use of Fetch](https://kubb.dev/plugins/plugin-client#importpath) for an example.

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'clients', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'clients'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - extends: ./_shared/core/content-type.yaml

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: "(ctx) => `${ctx.group}Controller`"
        description: Return the name of a group based on the group name. Used for the file and identifier generation.

  - extends: ./_shared/client/import-path.yaml

  - name: operations
    type: boolean
    required: false
    default: 'false'
    description: Create an `operations.ts` file with all operations grouped by methods.

  - extends: ./_shared/client/data-return-type.yaml

  - name: urlType
    type: "'export' | false"
    required: false
    default: 'false'
    description: Export URLs that are used by every operation.
    body: |
      - `'export'` will make them part of your barrel file.
      - `false` will not make them exportable.
    codeBlock:
      lang: typescript
      code: |
        export function getGetPetByIdUrl(petId: GetPetByIdPathParams['petId']) {
          return `/pet/${petId}` as const
        }

  - extends: ./_shared/client/params-type.yaml
  - extends: ./_shared/client/params-casing.yaml
  - extends: ./_shared/client/path-params-type.yaml
  - extends: ./_shared/client/parser.yaml
  - extends: ./_shared/client/client.yaml
  - extends: ./_shared/client/client-type.yaml
  - extends: ./_shared/client/wrapper.yaml
  - extends: ./_shared/client/bundle.yaml
  - extends: ./_shared/client/base-url.yaml
  - extends: ./_shared/core/include.yaml
  - extends: ./_shared/core/exclude.yaml
  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: 'Array<Generator<PluginClient>>'

  - extends: ./_shared/core/transformer.yaml
    name: transformers

  - name: resolver
    type: 'Partial<ResolverClient> & ThisType<ResolverClient>'
    required: false
    description: Override individual resolver methods to customize generated names. Any method you omit falls back to the preset resolver. Use `this.default(...)` to call the preset's implementation.
    codeBlock:
      lang: typescript
      code: |
        import { pluginClient } from '@kubb/plugin-client'

        pluginClient({
          resolver: {
            resolveName(name) {
              return `${this.default(name)}Client`
            },
          },
        })

  - name: transformer
    type: Visitor
    required: false
    experimental: true
    description: Apply an AST `Visitor` to transform operation nodes before they are printed.
    codeBlock:
      lang: typescript
      code: |
        import { pluginClient } from '@kubb/plugin-client'

        pluginClient({
          transformer: {
            operation(node) {
              return { ...node, operationId: `api_${node.operationId}` }
            },
          },
        })
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginTs } from '@kubb/plugin-ts'
          import { pluginClient } from '@kubb/plugin-client'

          export default defineConfig({
            input: { path: './petStore.yaml' },
            output: { path: './src/gen' },
            plugins: [
              pluginTs(),
              pluginClient({
                output: {
                  path: './clients/axios',
                  barrelType: 'named',
                  banner: '/* eslint-disable no-alert, no-console */',
                  footer: '',
                },
                group: {
                  type: 'tag',
                  name: ({ group }) => `${group}Service`,
                },
                resolver: {
                  resolveName(name) {
                    return `${this.default(name)}Client`
                  },
                },
                operations: true,
                parser: 'client',
                exclude: [{ type: 'tag', pattern: 'store' }],
                pathParamsType: 'object',
                dataReturnType: 'full',
                client: 'axios',
              }),
            ],
          })
        twoslash: false

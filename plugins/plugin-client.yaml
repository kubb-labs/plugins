$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json'
id: plugin-client
name: Client
description: Generate type-safe HTTP clients (Axios, Fetch) from OpenAPI specifications for making API requests.
category: client
type: official
version: 5.0.0-alpha.51
npmPackage: '@kubb/plugin-client'
docsPath: /plugins/plugin-client
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - api-client
  - axios
  - fetch
  - http-client
  - codegen
  - openapi
dependencies:
  - plugin-ts
resources:
  documentation: https://kubb.dev/plugins/plugin-client
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-client/CHANGELOG.md
featured: true
iconLight: 'https://kubb.dev/feature/axios.svg'
skills: []
options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'clients', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - name: path
        type: string
        required: true
        description: Output directory for generated files, relative to the global output path.
      - name: barrelType
        type: "'all' | 'named' | 'propagate' | false"
        required: false
        default: "'named'"
        description: Controls how index.ts barrel files are generated.
  - name: group
    type: Group
    required: false
    description: Group the clients based on the provided name (e.g. by tag).
  - name: exclude
    type: 'Array<Exclude>'
    required: false
    description: Array containing exclude parameters to skip tags/operations/methods/paths.
  - name: include
    type: 'Array<Include>'
    required: false
    description: Array containing include parameters to include tags/operations/methods/paths.
  - name: override
    type: 'Array<Override>'
    required: false
    description: Array containing override parameters to override options based on tags/operations/methods/paths.
  - name: client
    type: "'axios' | 'fetch'"
    required: false
    default: "'axios'"
    description: Which HTTP client to use. Use importPath instead to provide a custom client.
    values:
      - name: "'axios'"
        description: Generates client code using Axios for HTTP requests.
        example: |
          import client from '@kubb/plugin-client/clients/axios'
      - name: "'fetch'"
        description: Generates client code using the native Fetch API.
        example: |
          import client from '@kubb/plugin-client/clients/fetch'
  - name: importPath
    type: string
    required: false
    description: Custom client import path used as `import client from '${importPath}'`. Mutually exclusive with client.
  - name: operations
    type: boolean
    required: false
    default: 'false'
    description: Create an operations.ts file with all operations grouped by methods.
  - name: urlType
    type: "'export' | false"
    required: false
    default: 'false'
    description: Export URLs used by each operation. 'export' makes them part of your barrel file.
  - name: baseURL
    type: string
    required: false
    description: Custom base URL for all generated calls.
  - name: dataReturnType
    type: "'data' | 'full'"
    required: false
    default: "'data'"
    description: Return type when calling the client. 'data' returns ResponseConfig[data], 'full' returns ResponseConfig.
    values:
      - name: "'data'"
        description: Returns only the data property of the response.
        example: |
          export async function getPets(config: Partial<RequestConfig> = {}) {
            const { data } = await client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            return data
          }
      - name: "'full'"
        description: Returns the full response object including status, headers and data.
        example: |
          export async function getPets(config: Partial<RequestConfig> = {}) {
            const response = await client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            return response
          }
  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform parameter names to camelCase for path, query, and header params.
  - name: parser
    type: "'client' | 'zod'"
    required: false
    default: "'client'"
    description: Which parser to use before returning the data. 'zod' uses @kubb/plugin-zod for validation.
    values:
      - name: "'client'"
        description: Returns data as-is without additional validation.
        example: |
          export async function getPets(config: Partial<RequestConfig> = {}) {
            const { data } = await client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            return data
          }
      - name: "'zod'"
        description: Validates the response data against the generated Zod schema before returning.
        example: |
          export async function getPets(config: Partial<RequestConfig> = {}) {
            const { data } = await client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            return getPetsQueryResponseSchema.parse(data)
          }
  - name: clientType
    type: "'function' | 'class' | 'staticClass'"
    required: false
    default: "'function'"
    description: How to generate the client code. 'function' generates standalone functions, 'class' generates a class, 'staticClass' generates a class with static methods.
    values:
      - name: "'function'"
        description: Generates each operation as a standalone exported async function.
        example: |
          export async function getPets(config: Partial<RequestConfig> = {}) {
            return client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
          }
      - name: "'class'"
        description: Groups all operations into a class with instance methods.
        example: |
          export class PetsClient {
            async getPets(config: Partial<RequestConfig> = {}) {
              return client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            }
          }
      - name: "'staticClass'"
        description: Groups all operations into a class with static methods.
        example: |
          export class PetsClient {
            static async getPets(config: Partial<RequestConfig> = {}) {
              return client<GetPetsQueryResponse>({ method: 'get', url: '/pets', ...config })
            }
          }
  - name: bundle
    type: boolean
    required: false
    default: 'false'
    description: Bundle the selected client into the generated .kubb directory.
  - name: paramsType
    type: "'object' | 'inline'"
    required: false
    default: "'inline'"
    description: How to pass your params. 'object' merges all params into a single object, 'inline' uses separate function arguments.
    tip: When `paramsType` is `'object'`, `pathParamsType` is also forced to `'object'`.
    values:
      - name: "'object'"
        description: Merges all params into a single destructured object argument.
        example: |
          export async function deletePet(
            { petId, headers }: {
              petId: DeletePetPathParams['petId']
              headers?: DeletePetHeaderParams
            },
            config: Partial<RequestConfig> = {},
          ) { ... }
      - name: "'inline'"
        description: Passes each parameter as a separate function argument.
        example: |
          export async function deletePet(
            petId: DeletePetPathParams['petId'],
            headers?: DeletePetHeaderParams,
            config: Partial<RequestConfig> = {},
          ) { ... }
  - name: pathParamsType
    type: "'object' | 'inline'"
    required: false
    default: "'inline'"
    description: How path parameters are arranged within the inline argument list. Only applies when paramsType is 'inline'.
    tip: Only applies when `paramsType` is `'inline'`. When `paramsType` is `'object'`, this option is ignored.
    values:
      - name: "'object'"
        description: Wraps all path parameters into a single destructured object argument.
        example: |
          export async function getPetById(
            { petId }: { petId: GetPetByIdPathParams['petId'] },
            headers?: GetPetByIdHeaderParams,
            config: Partial<RequestConfig> = {},
          ) { ... }
      - name: "'inline'"
        description: Spreads each path parameter as an individual function argument.
        example: |
          export async function getPetById(
            petId: GetPetByIdPathParams['petId'],
            headers?: GetPetByIdHeaderParams,
            config: Partial<RequestConfig> = {},
          ) { ... }
  - name: wrapper
    type: '{ className: string }'
    required: false
    description: Generate a wrapper class that composes all tag-based client classes into a single entry point.
  - name: resolver
    type: 'Partial<ResolverClient>'
    required: false
    description: Override individual resolver methods to customize naming conventions.
  - name: transformer
    type: ast.Visitor
    required: false
    description: Single AST visitor applied to each node before printing.
  - name: generators
    type: 'Array<Generator<PluginClient>>'
    required: false
    description: Define additional generators next to the client generators.
fullExample: |
  import { defineConfig } from 'kubb'
  import { adapterOas } from '@kubb/adapter-oas'
  import { pluginTs } from '@kubb/plugin-ts'
  import { pluginClient } from '@kubb/plugin-client'

  export default defineConfig({
    input: { path: './petStore.yaml' },
    output: { path: './src/gen' },
    plugins: [
      pluginTs(),
      pluginClient({
        output: { path: 'clients', barrelType: 'named' },
        client: 'axios',
        dataReturnType: 'data',
        clientType: 'function',
        paramsCasing: 'camelcase',
        parser: 'client',
        operations: false,
      }),
    ],
  })

$schema: 'https://raw.githubusercontent.com/kubb-labs/kubb/main/schemas/plugins/plugin.json'
id: plugin-zod
name: Zod
description: Generate Zod validation schemas from OpenAPI specifications for runtime data validation.
category: validation
type: official
npmPackage: '@kubb/plugin-zod'
docsPath: /plugins/plugin-zod
repo: https://github.com/kubb-labs/plugins
codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/zod
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - zod
  - validation
  - schema
  - runtime-validation
  - codegen
  - openapi
dependencies: []
resources:
  documentation: https://kubb.dev/plugins/plugin-zod
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-zod/CHANGELOG.md
featured: true
icon:
  light: 'https://kubb.dev/feature/zod.svg'

intro: |
  # @kubb/plugin-zod

  Generate [Zod](https://zod.dev/) validation schemas from your OpenAPI schema.

  Kubb v5 always generates **Zod v4** schemas. Zod v3 is no longer supported.

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'zod', barrelType: 'named' }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'zod'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - extends: ./_shared/core/resolver.yaml
    type: 'Partial<ResolverZod> & ThisType<ResolverZod>'

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: "(ctx) => `${ctx.group}Controller`"
        description: Return the name of a group based on the group name. Used for the file and identifier generation.

  - name: importPath
    type: string
    required: false
    default: "'zod'"
    description: |
      Path to the Zod package used in generated import statements. Accepts a package name or a relative path. Set to `'zod/mini'` when using `mini: true`.

  - name: typed
    type: boolean
    required: false
    default: 'false'
    description: Annotate each generated schema with its inferred TypeScript type, using `@kubb/plugin-ts` output as the source. Requires `@kubb/plugin-ts` to be configured in the same `plugins` array.
    important: |
      We rely on [`ToZod`](https://github.com/colinhacks/tozod) from the creator of Zod to create a schema based on a type.
      Kubb contains its own version to those kind of conversions.

  - name: inferred
    type: boolean
    required: false
    default: 'false'
    description: Export a `z.infer<typeof schema>` type alias alongside each generated schema. This gives you a TypeScript type that always stays in sync with the schema's runtime validation.
    codeBlock:
      lang: typescript
      title: 'inferred: true'
      code: |
        import { z } from 'zod'

        export const petSchema = z.object({
          name: z.string(),
          status: z.enum(['available', 'pending', 'sold']).optional(),
        })

        // Inferred type export
        export type Pet = z.infer<typeof petSchema>

  - name: integerType
    warning: |
      This option has been moved to [`adapterOas`](/adapters/adapter-oas#integerType). Use `adapterOas({ integerType })` instead.

  - name: unknownType
    warning: |
      This option has been moved to [`adapterOas`](/adapters/adapter-oas#unknownType). Use `adapterOas({ unknownType })` instead.

  - name: emptySchemaType
    warning: |
      This option has been moved to [`adapterOas`](/adapters/adapter-oas#emptySchemaType). Use `adapterOas({ emptySchemaType })` instead.

  - name: coercion
    type: 'boolean | { dates?: boolean, strings?: boolean, numbers?: boolean }'
    required: false
    default: 'false'
    description: Apply `z.coerce` to automatically convert input values to the expected type before validation. Pass `true` to coerce all primitives, or an object to selectively enable coercion for `dates`, `strings`, and `numbers`. See [Coercion for primitives](https://zod.dev/?id=coercion-for-primitives).
    examples:
      - name: 'true'
        files:
          - lang: typescript
            code: |
              z.coerce.string();
              z.coerce.date();
              z.coerce.number();
            twoslash: false
      - name: 'false'
        files:
          - lang: typescript
            code: |
              z.string();
              z.date();
              z.number();
            twoslash: false
      - name: '{numbers: true, strings: false, dates: false}'
        files:
          - lang: typescript
            code: |
              z.string();
              z.date();
              z.coerce.number();
            twoslash: false

  - name: operations
    type: boolean
    required: false
    default: 'false'
    description: Generate a combined `operations.ts` file that exports all operation-level schemas grouped by `operationId`. When enabled, each operation gets its own schema that includes the request body, path params, query params, and response schemas.

  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform property names in path, query, and header parameter types to camelCase.
    codeBlock:
      lang: typescript
      title: "'camelcase'"
      code: |
        // OpenAPI spec uses: pet_id, X-Api-Key

        type GetPetPathParams = {
          petId: string   // ✓ camelCase
        }

        type GetPetHeaderParams = {
          xApiKey?: string  // ✓ camelCase
        }

  - name: guidType
    type: "'uuid' | 'guid'"
    required: false
    default: "'uuid'"
    description: |
      Validator to use for OpenAPI properties with `format: uuid`. Use `'guid'` to generate `.guid()` validation instead of the default `.uuid()`.
    examples:
      - name: "'uuid' (default)"
        files:
          - lang: typescript
            code: |
              z.uuid()
            twoslash: false
      - name: "'guid'"
        files:
          - lang: typescript
            code: |
              z.guid()
            twoslash: false

  - name: mini
    type: boolean
    required: false
    default: 'false'
    badge:
      type: tip
      text: beta
    description: |
      Use Zod Mini's functional API for better tree-shaking support.

      When enabled, generates functional syntax (e.g., `z.optional(z.string())`) instead of chainable methods (e.g., `z.string().optional()`).

      When `mini: true`, `importPath` will default to `'zod/mini'`.
    warning: |
      This feature is currently in beta. The API may change in future releases.
    tip: |
      Zod Mini provides a smaller bundle size with better tree-shaking. See [Zod Mini documentation](https://zod.dev/packages/mini) for more details.
    examples:
      - name: 'mini: true'
        files:
          - lang: typescript
            code: |
              // Import from zod/mini
              import { z } from 'zod/mini'

              // Functional syntax for better tree-shaking
              z.optional(z.string())
              z.nullable(z.number())
              z.array(z.string()).check(z.minLength(1), z.maxLength(10))
            twoslash: false
      - name: 'mini: false (default)'
        files:
          - lang: typescript
            code: |
              // Import from zod or zod/v4
              import { z } from 'zod'

              // Chainable method syntax
              z.string().optional()
              z.number().nullable()
              z.array(z.string()).min(1).max(10)
            twoslash: false

  - extends: ./_shared/core/include.yaml
  - extends: ./_shared/core/exclude.yaml
  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: 'Array<Generator<PluginZod>>'

  - extends: ./_shared/core/transformer.yaml

  - name: printer
    type: '{ nodes?: PrinterZodNodes | PrinterZodMiniNodes }'
    required: false
    description: |
      Override individual printer node handlers to customize how specific schema types are rendered. When `mini: true` the overrides apply to the Zod Mini printer.

      Each key is a `SchemaType` (e.g. `'integer'`, `'date'`). The function you provide replaces the built-in handler for that type. Use `this.transform` to recurse into nested schema nodes.
    examples:
      - name: Override integer to z.number()
        files:
          - lang: typescript
            code: |
              import { pluginZod } from '@kubb/plugin-zod'

              pluginZod({
                printer: {
                  nodes: {
                    integer() {
                      return 'z.number()'
                    },
                  },
                },
              })
            twoslash: false
      - name: Override date to z.string().date()
        files:
          - lang: typescript
            code: |
              import { pluginZod } from '@kubb/plugin-zod'

              pluginZod({
                printer: {
                  nodes: {
                    date(node) {
                      return 'z.string().date()'
                    },
                  },
                },
              })
            twoslash: false

  - name: wrapOutput
    type: '(arg: { output: string; schema: SchemaNode }) => string | undefined'
    required: false
    description: Wrap the generated Zod schema string with additional validation or metadata. The callback receives the schema's output string and the `SchemaNode` AST node, and returns the modified schema string.
    tip: |
      This is useful for cases where you need to extend the generated zod output with additional properties from an OpenAPI schema. E.g. in the case of `OpenAPI -> Zod -> OpenAPI`, you could include the examples from the schema for a given property and then ultimately provide a modified schema to a router that supports zod and OpenAPI spec generation.
    codeBlock:
      lang: typescript
      title: Conditionally append .openapi() to the generated schema
      code: |
        wrapOutput: ({ output, schema }) => {
          const metadata: Record<string, unknown> = {};

          if (schema.keywords?.includes('example')) {
            // access SchemaNode properties
          }

          if (Object.keys(metadata).length > 0) {
            return `${output}.openapi(${JSON.stringify(metadata)})`;
          }
        };
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb';
          import { pluginTs } from '@kubb/plugin-ts';
          import { pluginZod } from '@kubb/plugin-zod';

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs(),
              pluginZod({
                output: {
                  path: './zod',
                },
                group: { type: 'tag', name: ({ group }) => `${group}Schemas` },
                typed: true,
                dateType: 'stringOffset',
                importPath: 'zod',
              }),
            ],
          });
        twoslash: false

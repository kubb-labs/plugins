$schema: 'https://kubb.dev/schemas/extension.json'
kind: plugin
id: plugin-msw
name: MSW
description: Generate Mock Service Worker (MSW) handlers from OpenAPI specifications.
category: mocks
type: official
npmPackage: '@kubb/plugin-msw'
docsPath: /plugins/plugin-msw
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - msw
  - mock-service-worker
  - api-mocking
  - mocks
  - testing
  - codegen
  - openapi
dependencies:
  - plugin-ts
  - plugin-faker
resources:
  documentation: https://kubb.dev/plugins/plugin-msw
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-msw/CHANGELOG.md
  codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/msw
featured: false
icon:
  light: 'https://kubb.dev/feature/msw.svg'

intro: |
  # @kubb/plugin-msw

  Generate [MSW](https://mswjs.io/) API mock handlers from your OpenAPI schema. Mock API requests in development and tests with type-safe handlers.

options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'handlers', barrel: { type: 'named' } }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - extends: ./_shared/core/output-path.yaml
        default: "'handlers'"
      - extends: ./_shared/core/output-barrel-type.yaml
      - extends: ./_shared/core/output-banner.yaml
      - extends: ./_shared/core/output-footer.yaml
      - extends: ./_shared/core/output-override.yaml

  - name: handlers
    type: boolean
    required: false
    default: 'false'
    description: Create a `handlers.ts` file with all handlers grouped by methods.

  - extends: ./_shared/core/content-type.yaml

  - extends: ./_shared/client/base-url.yaml

  - extends: ./_shared/core/group.yaml
    properties:
      - extends: ./_shared/core/group-type.yaml
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: "(ctx) => `${ctx.group}Controller`"
        description: Return the name of a group based on the group name. This is used for file and identifier generation.

  - name: parser
    type: "'data' | 'faker'"
    required: false
    default: "'data'"
    description: Choose which parser to use when generating response data.
    body: |
      - `'faker'` will use `@kubb/plugin-faker` to generate the data for the response.
      - `'data'` will use your custom data to generate the data for the response.

  - extends: ./_shared/core/include.yaml
  - extends: ./_shared/core/exclude.yaml
  - extends: ./_shared/core/override.yaml

  - extends: ./_shared/core/generators.yaml
    type: 'Array<Generator<PluginMsw>>'

examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginMsw } from '@kubb/plugin-msw'
          import { pluginTs } from '@kubb/plugin-ts'

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs(),
              pluginMsw({
                output: {
                  path: './mocks',
                  barrel: { type: 'named' },
                  banner: '/* eslint-disable no-alert, no-console */',
                  footer: '',
                },
                group: {
                  type: 'tag',
                  name: ({ group }) => `${group}Service`,
                },
                handlers: true,
              }),
            ],
          })
        twoslash: false

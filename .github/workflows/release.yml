name: Release
on:
  workflow_dispatch:
    inputs:
      version_pr:
        description: 'Only open or update the Version Packages PR. Skip staging entirely'
        type: boolean
        default: false
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
      - '.github/workflows/release.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'kubb-labs' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # id-token: write enables npm OIDC trusted publishing — no NPM_TOKEN needed.
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      staged: ${{ steps.changesets.outputs.staged }}
      staged_packages: ${{ steps.changesets.outputs.staged_packages }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@61cdd3211cf116b44033357a5baff45dc28f0ca5 # main
        with:
          node-version: '22.22.3'
          cache: 'false'
          force-install: 'true'

      # Skipped entirely for a version_pr manual dispatch: that mode exists so
      # a maintainer can safely refresh the Version Packages PR without any
      # chance of staging real packages.
      - name: Build
        if: ${{ !inputs.version_pr }}
        run: pnpm run build

      - name: Test
        if: ${{ !inputs.version_pr }}
        run: pnpm run test --coverage

      - name: Upload coverage reports to Codecov
        if: ${{ !inputs.version_pr }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # When pending changesets exist, changesets/action opens the Version
      # Packages PR. When versions are already bumped, it runs the publish
      # command, which stages the workspace via `scripts/release.mjs`.
      # createGithubReleases stays off: a staged version isn't public until
      # `promote` confirms npm approval, so nothing should announce it yet.
      - name: Release
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm exec changeset version
          publish: ${{ !inputs.version_pr && 'node scripts/release.mjs' || '' }}
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
          createGithubReleases: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Canary skips staging on purpose, so it stays automatic on every push.
      # If the npm Trusted Publisher for these packages is ever locked to
      # stage-only, this step will need its own non-stage-restricted entry.
      - name: Publish canary
        if: ${{ steps.changesets.outputs.staged != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
        # Every main push publishes 0.0.0-canary-<UTC timestamp> under the
        # `canary` dist-tag. The 0.0.0 base guarantees canaries sort below any
        # real release and never collide with the `latest` tag.
        run: |
          canary_version="0.0.0-canary-$(date -u +%Y%m%d%H%M%S)"
          echo "Canary version: ${canary_version}"
          pnpm -r exec bash -c "npm --no-git-tag-version version '${canary_version}' || true"
          pnpm run build
          pnpm exec changeset publish --tag canary

  promote:
    name: Promote staged release
    needs: [release]
    if: ${{ needs.release.outputs.staged == 'true' }}
    environment:
      name: npm-release-approval
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create
    outputs:
      approved: ${{ steps.verify.outputs.approved }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@61cdd3211cf116b44033357a5baff45dc28f0ca5 # main
        with:
          node-version: '22.22.3'
          cache: 'false'

      # A green environment review only means a maintainer clicked approve,
      # not that they actually ran `npm stage approve`. This confirms the
      # staged versions are really live on the registry before anything
      # public fires.
      - name: Verify staged versions are live on npm
        id: verify
        run: node scripts/verifyRegistry.mjs
        env:
          STAGED_PACKAGES: ${{ needs.release.outputs.staged_packages }}

      # Tags are created here, not at stage time, so a rejected or expired
      # staged package never leaves a dangling tag behind (see
      # changesets/changesets#2025). The versions are already confirmed live
      # above, so tagging now always points at something real.
      - name: Tag released versions
        run: |
          pnpm exec changeset tag
          git push --tags

      # One release per package, notes pulled from that package's own
      # CHANGELOG.md (each plugin versions independently here, unlike
      # kubb-labs/kubb where every package shares one version).
      - name: Create GitHub Releases
        run: node scripts/createReleases.mjs
        env:
          STAGED_PACKAGES: ${{ needs.release.outputs.staged_packages }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-platform:
    name: Dispatch content-updated to platform
    needs: [release, promote]
    if: ${{ needs.promote.outputs.approved == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: kubb-labs/platform
          event-type: content-updated
          client-payload: '{"source": "plugins", "tag": "${{ github.ref_name }}"}'

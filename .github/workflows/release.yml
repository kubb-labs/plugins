name: Release
on:
  workflow_dispatch:
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
      - '.github/workflows/release.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'kubb-labs' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # id-token: write enables npm OIDC trusted publishing — no NPM_TOKEN needed.
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      staged: ${{ steps.release.outputs.staged }}
      staged_packages: ${{ steps.release.outputs.staged_packages }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@d2daeb58eb7dc8c19d595c926b4788b7f682fb51 # main
        with:
          node-version: '22.22.3'
          cache: 'false'
          force-install: 'true'

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Release
        id: release
        uses: kubb-labs/config/.github/actions/release@6498246dc71ad3c27db69f9cc1f928a05e79d0c7 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Canary skips staging on purpose, so it stays automatic on every push.
      # If the npm Trusted Publisher for these packages is ever locked to
      # stage-only, this step will need its own non-stage-restricted entry.
      - name: Publish canary
        if: ${{ steps.release.outputs.staged != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
        # Stamp each package to a unique canary version so it can't collide
        # with the `latest` tag, then rebuild and publish.
        run: |
          pnpm -r exec bash -c '
            npm --no-git-tag-version version minor || true
            version=$(node -p "require(\"./package.json\").version")
            canary_version="${version}-canary.$(date +%Y%m%dT%H%M%S)"
            echo "Version that will be published: ${canary_version}"
            npm --no-git-tag-version version "${canary_version}" || true
          '
          pnpm run build
          pnpm exec changeset publish --tag canary

  promote:
    name: Promote staged release
    needs: [release]
    if: ${{ needs.release.outputs.staged == 'true' }}
    environment:
      name: npm-release-approval
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create
    outputs:
      approved: ${{ steps.promote.outputs.approved }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@d2daeb58eb7dc8c19d595c926b4788b7f682fb51 # main
        with:
          node-version: '22.22.3'
          cache: 'false'

      # Every staged package gets its own release here, since packages in
      # this repo version and changelog independently (see the empty `fixed`
      # and `linked` groups in .changeset/config.json) — unlike kubb-labs/kubb,
      # where every package shares one fixed version and one combined release,
      # so this omits release-mode (defaults to per-package).
      - name: Promote
        id: promote
        uses: kubb-labs/config/.github/actions/promote@6498246dc71ad3c27db69f9cc1f928a05e79d0c7 # main
        with:
          staged-packages: ${{ needs.release.outputs.staged_packages }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-platform:
    name: Dispatch content-updated to platform
    needs: [release, promote]
    if: ${{ needs.promote.outputs.approved == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: kubb-labs/platform
          event-type: content-updated
          client-payload: '{"source": "plugins", "tag": "${{ github.ref_name }}"}'

name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional: Custom tag for canary release'
        required: false
        type: string
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'kubb-labs'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'
          cache: 'false'

      - name: Reinstall dependencies (release hardening)
        # Defense-in-depth: re-install so the release build does not implicitly
        # trust a pnpm store restored from cache by the composite Setup Tools
        # step. Lockfile integrity hashes still gate content.
        run: pnpm install --frozen-lockfile --force

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Stage publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        if: ${{ github.event.inputs.tag == '' }}
        with:
          # `changeset tag` prints the same `New tag:` lines as changeset
          # publish and creates the local git tags. The action parses those
          # lines, pushes the tags, and creates a GitHub Release per package
          # with the CHANGELOG section as the body (changeset's own logic).
          # `stage publish` only stages on npm, so it has to run too.
          publish: pnpm release:stage && pnpm exec changeset tag && echo "staged=true" >> "$GITHUB_OUTPUT"
          commit: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ inputs.tag || 'canary' }}
        id: canary
        if: steps.changesets.outputs.staged != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          RELEASE_TAG: ${{ inputs.tag || 'canary' }}
        # Canaries auto-publish straight to npm under their dist-tag via OIDC,
        # no stage + 2FA approval. They never land on `latest`, so the staging
        # gate isn't needed and a canary you'd have to approve by hand is useless.
        run: |
          git checkout main
          pnpm version:canary
          pnpm release:canary --tag "$RELEASE_TAG"

name: PR

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm build

  typecheck:
    name: Typecheck
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  tests:
    name: Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: build
    env:
      TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Test
        run: pnpm run test --coverage

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  linting:
    name: Linting
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Linting
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm run lint

  benchmarks:
    name: Performance benchmarks (Vitest)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm build

      - name: Run Vitest benchmarks
        run: pnpm run test:bench

  prerelease:
    name: Prerelease
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Publish preview packages
        run: pnpx pkg-pr-new publish --pnpm --owner=stijnvanhulle --repo=https://github.com/kubb-labs/plugins.git './packages/*' --template './examples/*'

  dependency-diff:
    name: Dependency Diff
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Analyze dependency changes
        uses: e18e/action-dependency-diff@5d3c6ac2ad2de2eaca1dc120c5accfd9590764b6 # v1
        continue-on-error: true
        with:
          duplicate-threshold: 5
          size-threshold: -1

  # This job automatically updates generated example files when package code changes
  # It creates a new PR targeting the source branch with the generated updates
  update-examples:
    name: Update generated examples
    timeout-minutes: 20
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Generate examples
        id: generate
        run: pnpm run generate
        env:
          KUBB_DISABLE_TELEMETRY: '1'

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain examples/) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in examples/"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in examples/"
          fi

      - name: Create Pull Request with generated files
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          base: ${{ github.head_ref || github.ref_name }}
          branch: chore/update-generated-examples-${{ github.event.number }}
          delete-branch: true
          title: 'chore: update generated examples'
          commit-message: 'chore(examples): update generated files'
          body: |
            Automated update of generated example files from `pnpm generate`.

            This PR was automatically created to keep example generated files in sync.

  e2e:
    name: Build and test on ${{ matrix.os }}
    timeout-minutes: 30
    if: github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Run E2E tests
        working-directory: ./tests/e2e
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          KUBB_DISABLE_TELEMETRY: '1'
        run: |
          pnpm run generate --debug

$schema: https://kubb.dev/schemas/extension.json
kind: plugin
id: plugin-faker
name: Faker
description: Generate Faker.js mock-data factories from OpenAPI for tests, Storybook, and seeded local data.
category: mocks
type: official
npmPackage: '@kubb/plugin-faker'
docsPath: /plugins/plugin-faker
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - faker
  - mock-data
  - mocks
  - fixtures
  - testing
  - codegen
  - openapi
dependencies:
  - plugin-ts
resources:
  documentation: https://kubb.dev/plugins/plugin-faker
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-faker/CHANGELOG.md
  codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/faker
featured: false
icon:
  light: https://kubb.dev/feature/faker.svg
intro: |
  # @kubb/plugin-faker

  Generate a mock-data factory function for every schema in your OpenAPI spec, powered by [Faker.js](https://fakerjs.dev/). Call `createPet()` to get a realistic `Pet` object — useful for tests, Storybook, and local development without a running backend.

  Pair with `@kubb/plugin-msw` to mock entire endpoints, or use the factories directly in your test suite.
options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'mocks', barrel: { type: 'named' } }"
    description: Where the generated mock factories are written and how they are exported.
    properties:
      - name: path
        type: string
        required: true
        description: |
          Folder (or single file) where the plugin writes its generated code. The path is resolved against the global `output.path` set on `defineConfig`.

          Use a folder to keep each generator's output isolated (`'types'`, `'clients'`, `'hooks'`). Use a single file when you want everything in one place, for example `'api.ts'`.
        tip: |
          When `output.path` points to a single file, the `group` option cannot be used because every operation ends up in the same file.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { path: './types' },
                      }),
                    ],
                  })
          - name: Resulting tree
            files:
              - lang: text
                twoslash: false
                code: |
                  src/
                  └── gen/
                      └── types/
                          ├── Pet.ts
                          └── Store.ts
        default: "'mocks'"
      - name: barrel
        type: "{ type: 'named' | 'all', nested?: boolean } | false"
        required: false
        default: "{ type: 'named' }"
        description: |
          Controls how the generated `index.ts` (barrel) file re-exports the plugin's output.

          - `{ type: 'named' }` re-exports each symbol by name. Best for tree-shaking and explicit imports.
          - `{ type: 'all' }` uses `export *`. Smaller barrel file, but exports everything.
          - `{ nested: true }` creates a barrel in every subdirectory, so callers can import from any depth.
          - `false` skips the barrel entirely. The plugin's files are also excluded from the root `index.ts`.
        tip: |
          Pick `'named'` when consumers care about which symbols they import (better tree-shaking, friendlier auto-import). Pick `'all'` when the file count is small and you want a one-line barrel.
        examples:
          - name: "'named' (default)"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export { Pet, PetStatus } from './Pet'
                  export { Store } from './Store'
          - name: "'all'"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'all' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export * from './Pet'
                  export * from './Store'
          - name: nested
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named', nested: true } },
                      }),
                    ],
                  })
              - name: Generated tree
                lang: text
                twoslash: false
                code: |
                  src/gen/types/
                  ├── index.ts          # re-exports ./petController and ./storeController
                  ├── petController/
                  │   ├── index.ts      # re-exports Pet, Store, ...
                  │   └── Pet.ts
                  └── storeController/
                      ├── index.ts
                      └── Store.ts
          - name: 'false'
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: false },
                      }),
                    ],
                  })
              - name: Result
                lang: text
                twoslash: false
                code: |
                  # No index.ts is generated for this plugin.
                  # Its files are also excluded from the root index.ts.
      - name: banner
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text prepended to every generated file. Useful for license headers, lint disables, or `@ts-nocheck` directives.

          Pass a string for a static banner. Pass a function to compute the banner from each file's `RootNode` (the AST root containing path, schema, and operation context).
        examples:
          - name: Static banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */\n// @ts-nocheck',
                        },
                      }),
                    ],
                  })
              - name: Generated file
                lang: typescript
                twoslash: false
                code: |
                  /* eslint-disable */
                  // @ts-nocheck
                  export type Pet = {
                    id: number
                    name: string
                  }
          - name: Dynamic banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: (node) => `// Source: ${node.path}\n// Generated at ${new Date().toISOString()}`,
                        },
                      }),
                    ],
                  })
      - name: footer
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text appended at the end of every generated file. The mirror of `banner` — use it for closing comments, re-enabling lint rules, or marker lines.

          Pass a string for a static footer, or a function that receives the file's `RootNode` and returns the footer text.
        examples:
          - name: Re-enable lint after a banner disable
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */',
                          footer: '/* eslint-enable */',
                        },
                      }),
                    ],
                  })
      - name: override
        type: boolean
        required: false
        default: 'false'
        description: |
          Allows the plugin to overwrite hand-written files that share a name with a generated file.

          - `false` (default): Kubb skips a file if it already exists and is not marked as generated. This protects manual edits.
          - `true`: Kubb overwrites any file at the target path, including hand-written ones.
        warning: |
          Enable this only when you are sure the target folder contains nothing you need to keep. Local edits are lost on the next generation.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { override: true },
                      }),
                    ],
                  })
  - name: group
    type: Group
    required: false
    description: |
      Splits generated files into subfolders based on the operation's tag, so each tag in your OpenAPI spec gets its own directory.

      Without `group`, every file lands in the plugin's `output.path` folder. With `group`, files are bucketed under `{output.path}/{groupName}/`, where `groupName` is derived from the operation's first tag.
    tip: |
      Use `group` to mirror your API's domain structure (pet, store, user) in the generated code. Combine it with `output.barrel: { type: 'named', nested: true }` to get per-tag barrel files.
    examples:
      - name: kubb.config.ts
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    group: {
                      type: 'tag',
                      name: ({ group }) => `${group}Controller`,
                    },
                  }),
                ],
              })
    body: |
      With the configuration above, the generator emits:

      ```text
      src/gen/
      ├── petController/
      │   ├── AddPet.ts
      │   └── GetPet.ts
      └── storeController/
          ├── CreateStore.ts
          └── GetStoreById.ts
      ```
    properties:
      - name: type
        type: "'tag'"
        required: true
        description: |
          Property used to assign each operation to a group. Required whenever `group` is set.

          Today only `'tag'` is supported: Kubb reads the first tag on the operation (`operation.getTags().at(0)?.name`) and uses it as the group key. Operations without a tag are placed in a default group.
        note: |
          `Required: true*` is conditional — only required when the parent `group` option is used. `group` itself stays optional.
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: (ctx) => `${ctx.group}Controller`
        description: Function that builds the folder/identifier name from a group key (the operation's first tag).
  - name: dateParser
    type: "'faker' | 'dayjs' | 'moment' | string"
    required: false
    default: "'faker'"
    description: |
      Library used to format `date`, `time`, and `datetime` fields that are represented as strings.

      Use a value other than `'faker'` when you already have a date library in the project and want consistent formatting across mocks and runtime. The plugin auto-imports the default export of the library you choose.
    tip: |
      Any library exporting a default function works (`dayjs`, `moment`, `luxon`, ...). Kubb adds the import statement for you.
    examples:
      - name: "'faker' (default)"
        files:
          - lang: typescript
            twoslash: false
            code: |
              faker.date.anytime().toISOString().substring(0, 10)
      - name: "'dayjs'"
        files:
          - lang: typescript
            twoslash: false
            code: |
              dayjs(faker.date.anytime()).format('YYYY-MM-DD')
      - name: "'moment'"
        files:
          - lang: typescript
            twoslash: false
            code: |
              moment(faker.date.anytime()).format('YYYY-MM-DD')
  - name: mapper
    type: Record<string, string>
    required: false
    description: |
      Maps OpenAPI schema names to specific Faker expressions. Use this when the schema name does not give Faker enough context to pick a sensible value (`'email'`, `'phone'`, `'avatarUrl'`).

      Keys are the schema name (case-sensitive); values are the JavaScript expression that produces the mock value.
    codeBlock:
      lang: typescript
      title: kubb.config.ts
      code: |
        import { defineConfig } from 'kubb'
        import { pluginFaker } from '@kubb/plugin-faker'

        export default defineConfig({
          input: { path: './petStore.yaml' },
          output: { path: './src/gen' },
          plugins: [
            pluginFaker({
              mapper: {
                email: 'faker.internet.email()',
                avatarUrl: 'faker.image.avatar()',
              },
            }),
          ],
        })
  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: |
      Renames properties inside the generated path/query/header mocks. Body mocks are unaffected.
    important: |
      Set the same `paramsCasing` here as on `@kubb/plugin-ts` so the generated mocks stay assignable to the generated types.
  - name: regexGenerator
    type: "'faker' | 'randexp'"
    required: false
    default: "'faker'"
    description: |
      Library used to generate strings that satisfy a regex `pattern` keyword in the OpenAPI spec.

      - `'faker'` (default) — `faker.helpers.fromRegExp(...)`. No extra dependency.
      - `'randexp'` — uses the `randexp` package, which supports a wider regex grammar (lookaheads, named groups) but adds a runtime dependency.
    examples:
      - name: "'faker' (default)"
        files:
          - lang: typescript
            twoslash: false
            code: |
              faker.helpers.fromRegExp('^[A-Z]+$')
      - name: "'randexp'"
        files:
          - lang: typescript
            twoslash: false
            code: |
              new RandExp(/^[A-Z]+$/).gen()
  - name: seed
    type: number | number[]
    required: false
    description: |
      Seed value passed to `faker.seed(...)`. Set this to get deterministic output across runs — handy for snapshot tests and reproducible local data.
    examples:
      - name: Deterministic seed
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginFaker } from '@kubb/plugin-faker'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginFaker({ seed: 100 }),
                ],
              })
  - name: locale
    type: string
    required: false
    default: "'en'"
    description: |
      Faker locale used for generated mock values. Switches the named import to `fakerXX` from `@faker-js/faker` so names, addresses, and phone numbers reflect the target region.

      Defaults to `'en'`, which imports `fakerEN`.
    tip: |
      See [Faker.js localization](https://fakerjs.dev/api/localization.html) for the full list of locale codes.
    examples:
      - name: "'de'"
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { fakerDE as faker } from '@faker-js/faker'
      - name: "'de_AT'"
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { fakerDE_AT as faker } from '@faker-js/faker'
  - name: include
    type: Array<Include>
    required: false
    description: |
      Restricts generation to operations that match at least one entry in the list. Anything not matched is skipped.

      Each entry filters by one of:

      - `tag` — the operation's first tag in the OpenAPI spec.
      - `operationId` — the operation's `operationId`.
      - `path` — the URL pattern (`'/pet/{petId}'`).
      - `method` — HTTP method (`'get'`, `'post'`, ...).
      - `contentType` — the media type of the request body.

      `pattern` accepts either a string (exact match) or a `RegExp` for fuzzy matches.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Include = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
        }
    examples:
      - name: Only the pet tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    include: [
                      { type: 'tag', pattern: 'pet' },
                    ],
                  }),
                ],
              })
      - name: Only GET operations under /pet
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    include: [
                      { type: 'method', pattern: 'get' },
                      { type: 'path', pattern: /^\/pet/ },
                    ],
                  }),
                ],
              })
  - name: exclude
    type: Array<Exclude>
    required: false
    description: |
      Skips any operation that matches at least one entry in the list. The opposite of `include`.

      Each entry filters by one of:

      - `tag` — the operation's first tag.
      - `operationId` — the operation's `operationId`.
      - `path` — the URL pattern (`'/pet/{petId}'`).
      - `method` — HTTP method (`'get'`, `'post'`, ...).
      - `contentType` — the media type of the request body.

      `pattern` accepts a plain string or a `RegExp`. When both `include` and `exclude` are set, `exclude` wins.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Exclude = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
        }
    examples:
      - name: Skip everything under the store tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    exclude: [
                      { type: 'tag', pattern: 'store' },
                    ],
                  }),
                ],
              })
      - name: Skip a specific operation and all delete methods
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    exclude: [
                      { type: 'operationId', pattern: 'deletePet' },
                      { type: 'method', pattern: 'delete' },
                    ],
                  }),
                ],
              })
  - name: override
    type: Array<Override>
    required: false
    description: |
      Applies a different set of plugin options to operations that match a pattern. Use this when most of your API should follow the global config, but a handful of endpoints need different treatment.

      Each entry has the same `type` and `pattern` shape as `include`/`exclude`, plus an `options` object that overrides the plugin's options for matched operations.

      Entries are evaluated top to bottom. The first matching entry's `options` is merged onto the plugin defaults; later entries do not stack.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Override = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
          options: PluginOptions
        }
    examples:
      - name: Use a different enum style for the user tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    enumType: 'asConst',
                    override: [
                      {
                        type: 'tag',
                        pattern: 'user',
                        options: { enumType: 'literal' },
                      },
                    ],
                  }),
                ],
              })
  - name: generators
    type: Array<Generator<PluginFaker>>
    required: false
    experimental: true
    description: |
      Adds custom generators that run alongside the plugin's built-in generators. Each generator can emit additional files or post-process existing ones using the plugin's AST and options.

      Use this when you need output the plugin does not produce out of the box (a custom client wrapper, an extra index, a metadata file). For end-to-end guidance, see [Creating plugins](https://kubb.dev/docs/5.x/guides/creating-plugins).
    warning: |
      Generators are an experimental, low-level API. The signature may change between minor releases.
  - name: resolver
    type: Partial<ResolverFaker>
    required: false
    description: |
      Customizes the naming of the generated factory helpers. Common use case: append `Mock` or `Factory` so the helpers do not clash with the imported types.
    codeBlock:
      lang: typescript
      title: Append "Mock" to every factory name
      code: |
        import { defineConfig } from 'kubb'
        import { pluginFaker } from '@kubb/plugin-faker'

        export default defineConfig({
          input: { path: './petStore.yaml' },
          output: { path: './src/gen' },
          plugins: [
            pluginFaker({
              resolver: {
                resolveName(name) {
                  return `${this.default(name)}Mock`
                },
              },
            }),
          ],
        })
  - name: transformer
    type: ast.Visitor
    required: false
    description: |
      AST visitor applied to schema/operation nodes before code is printed. Use this to drop descriptions or rewrite metadata before the mock factory is built.
    codeBlock:
      lang: typescript
      title: Strip schema descriptions
      code: |
        import { defineConfig } from 'kubb'
        import { pluginFaker } from '@kubb/plugin-faker'

        export default defineConfig({
          input: { path: './petStore.yaml' },
          output: { path: './src/gen' },
          plugins: [
            pluginFaker({
              transformer: {
                schema(node) {
                  return { ...node, description: undefined }
                },
              },
            }),
          ],
        })
  - name: printer
    type: '{ nodes?: PrinterFakerNodes }'
    required: false
    description: |
      Replaces the Faker handler for a specific schema type (e.g. `'integer'`, `'date'`, `'ref'`). Each handler returns the Faker expression as a string.

      Use `this.transform` to recurse into nested schema nodes and `this.options` to read printer options.
    examples:
      - name: Use faker.number.float() for integers
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginFaker } from '@kubb/plugin-faker'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginFaker({
                    printer: {
                      nodes: {
                        integer() {
                          return 'faker.number.float()'
                        },
                      },
                    },
                  }),
                ],
              })
      - name: Override date strings
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginFaker } from '@kubb/plugin-faker'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginFaker({
                    printer: {
                      nodes: {
                        date(node) {
                          if (node.representation === 'string') {
                            return 'new Date().toISOString().substring(0, 10)'
                          }

                          return 'new Date()'
                        },
                      },
                    },
                  }),
                ],
              })
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        twoslash: false
        code: |
          import { defineConfig } from 'kubb'
          import { pluginFaker } from '@kubb/plugin-faker'
          import { pluginTs } from '@kubb/plugin-ts'

          export default defineConfig({
            input: { path: './petStore.yaml' },
            output: { path: './src/gen' },
            plugins: [
              pluginTs({
                output: { path: './types' },
              }),
              pluginFaker({
                output: { path: './mocks' },
                seed: [100],
                paramsCasing: 'camelcase',
              }),
            ],
          })

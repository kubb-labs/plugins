$schema: https://kubb.dev/schemas/extension.json
kind: plugin
id: plugin-mcp
name: MCP
description: Generate a Model Context Protocol (MCP) server from OpenAPI so AI assistants like Claude can call your API as tools.
category: ai
type: official
npmPackage: '@kubb/plugin-mcp'
docsPath: /plugins/plugin-mcp
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - mcp
  - model-context-protocol
  - ai
  - claude
  - llm
  - codegen
  - openapi
dependencies:
  - plugin-ts
  - plugin-client
  - plugin-zod
resources:
  documentation: https://kubb.dev/plugins/plugin-mcp
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-mcp/CHANGELOG.md
  codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/mcp
featured: false
icon:
  light: https://kubb.dev/feature/mcp-light.svg
  dark: https://kubb.dev/feature/mcp-dark.svg
intro: |
  # @kubb/plugin-mcp

  Generate a [Model Context Protocol](https://modelcontextprotocol.io/introduction) server straight from your OpenAPI spec. Every operation becomes a typed MCP tool that AI assistants (Claude Desktop, Claude Code, MCP-compatible clients) can call directly.

  The plugin emits the tool definitions, the request handlers, and the Zod schemas they validate against. Plug the generated server into Claude with one config file.

  ```mermaid
  graph TD
    A[OpenAPI spec] --> B[Kubb<br/>code generation]
    B --> C[MCP server<br/>tool registry]
    C --> D[Claude / MCP client]
    D -->|Tool call| C
    C -->|HTTP request| E[Your API]
  ```
notes:
  - type: tip
    body: |
      See [Connect Claude to a remote MCP server](https://modelcontextprotocol.io/docs/tools/claude-desktop) for connecting the generated server.
options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'mcp', barrel: { type: 'named' } }"
    description: Where the generated MCP tool handlers are written and how they are exported.
    properties:
      - name: path
        type: string
        required: true
        description: |
          Folder where the plugin writes its generated code. The path is resolved against the global `output.path` set on `defineConfig`.

          Use a folder to keep each generator's output isolated (`'types'`, `'clients'`, `'hooks'`). To put everything in one file, set `output.mode: 'file'` and point `path` at the target file including its extension (e.g. `'types.ts'`).
        tip: |
          `output.path` sets where files go, `output.mode` sets how many. See `output.mode` for the single-file and one-file-per-group layouts.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { path: './types' },
                      }),
                    ],
                  })
          - name: Resulting tree
            files:
              - lang: text
                twoslash: false
                code: |
                  src/
                  └── gen/
                      └── types/
                          ├── Pet.ts
                          └── Store.ts
        default: "'mcp'"
      - name: mode
        type: "'directory' | 'group' | 'file'"
        required: false
        default: "'directory'"
        description: |
          How the plugin consolidates its generated code into files.

          - `'directory'` writes one file per operation or schema under `output.path`. This is the default.
          - `'group'` writes one file per resolved group and needs the `group` option set.
          - `'file'` writes everything into a single file. The `output.path` must include the file extension (e.g. `'types.ts'`, `'models.py'`).
        tip: |
          `mode: 'group'` requires the sibling `group` option. Setting it without `group` stops the build with a `KUBB_INVALID_PLUGIN_OPTIONS` error. `mode: 'file'` forbids `group` — a single-file output has nothing to group.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'
                  import { pluginClient } from '@kubb/plugin-client'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { path: 'types.ts', mode: 'file' },
                      }),
                      pluginClient({
                        output: { path: 'clients', mode: 'group' },
                        group: { type: 'tag' },
                      }),
                    ],
                  })
          - name: Resulting tree
            files:
              - lang: text
                twoslash: false
                code: |
                  src/
                  └── gen/
                      ├── types.ts
                      └── clients/
                          ├── pet.ts
                          └── store.ts
      - name: barrel
        type: "{ type: 'named' | 'all', nested?: boolean } | false"
        required: false
        default: "{ type: 'named' }"
        description: |
          Controls how the generated `index.ts` (barrel) file re-exports the plugin's output.

          - `{ type: 'named' }` re-exports each symbol by name. Best for tree-shaking and explicit imports.
          - `{ type: 'all' }` uses `export *`. Smaller barrel file, but exports everything.
          - `{ nested: true }` creates a barrel in every subdirectory, so callers can import from any depth.
          - `false` skips the barrel entirely. The plugin's files are also excluded from the root `index.ts`.
        tip: |
          Pick `'named'` when consumers care about which symbols they import (better tree-shaking, friendlier auto-import). Pick `'all'` when the file count is small and you want a one-line barrel.
        examples:
          - name: "'named' (default)"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export { Pet, PetStatus } from './Pet'
                  export { Store } from './Store'
          - name: "'all'"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'all' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export * from './Pet'
                  export * from './Store'
          - name: nested
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named', nested: true } },
                      }),
                    ],
                  })
              - name: Generated tree
                lang: text
                twoslash: false
                code: |
                  src/gen/types/
                  ├── index.ts          # re-exports ./pet and ./store
                  ├── pet/
                  │   ├── index.ts      # re-exports Pet, Store, ...
                  │   └── Pet.ts
                  └── store/
                      ├── index.ts
                      └── Store.ts
          - name: 'false'
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: false },
                      }),
                    ],
                  })
              - name: Result
                lang: text
                twoslash: false
                code: |
                  # No index.ts is generated for this plugin.
                  # Its files are also excluded from the root index.ts.
      - name: banner
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text prepended to every generated file. Useful for license headers, lint disables, or `@ts-nocheck` directives.

          Pass a string for a static banner. Pass a function to compute the banner from each file's `RootNode` (the AST root containing path, schema, and operation context).
        examples:
          - name: Static banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */\n// @ts-nocheck',
                        },
                      }),
                    ],
                  })
              - name: Generated file
                lang: typescript
                twoslash: false
                code: |
                  /* eslint-disable */
                  // @ts-nocheck
                  export type Pet = {
                    id: number
                    name: string
                  }
          - name: Dynamic banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: (node) => `// Source: ${node.path}\n// Generated at ${new Date().toISOString()}`,
                        },
                      }),
                    ],
                  })
      - name: footer
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text appended at the end of every generated file. The mirror of `banner` — use it for closing comments, re-enabling lint rules, or marker lines.

          Pass a string for a static footer, or a function that receives the file's `RootNode` and returns the footer text.
        examples:
          - name: Re-enable lint after a banner disable
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */',
                          footer: '/* eslint-enable */',
                        },
                      }),
                    ],
                  })
      - name: override
        type: boolean
        required: false
        default: 'false'
        description: |
          Allows the plugin to overwrite hand-written files that share a name with a generated file.

          - `false` (default): Kubb skips a file if it already exists and is not marked as generated. This protects manual edits.
          - `true`: Kubb overwrites any file at the target path, including hand-written ones.
        warning: |
          Enable this only when you are sure the target folder contains nothing you need to keep. Local edits are lost on the next generation.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { override: true },
                      }),
                    ],
                  })
  - name: resolver
    type: Partial<ResolverMcp> & ThisType<ResolverMcp>
    required: false
    description: |
      Overrides how the plugin builds names and paths for generated files and symbols. Use this to add prefixes, suffixes, or to swap the casing strategy without forking the plugin.

      Only override the methods you want to change. Anything you omit falls back to the plugin's default resolver. A method that returns `null` or `undefined` also falls back.

      Inside each method, `this` is bound to the full resolver, so you can call `this.default(name, 'function')` to delegate to the built-in implementation.
    body: |
      Each plugin ships with a default resolver:

      | Plugin | Default resolver |
      | --- | --- |
      | `@kubb/plugin-ts` | `resolverTs` |
      | `@kubb/plugin-zod` | `resolverZod` |
      | `@kubb/plugin-faker` | `resolverFaker` |
      | `@kubb/plugin-cypress` | `resolverCypress` |
      | `@kubb/plugin-msw` | `resolverMsw` |
      | `@kubb/plugin-mcp` | `resolverMcp` |
      | `@kubb/plugin-client` | `resolverClient` |
    codeBlock:
      lang: typescript
      title: Prefix every tool name with "Mcp"
      code: |
        import { defineConfig } from 'kubb'
        import { pluginMcp } from '@kubb/plugin-mcp'

        export default defineConfig({
          input: { path: './petStore.yaml' },
          output: { path: './src/gen' },
          plugins: [
            pluginMcp({
              resolver: {
                resolveName(name) {
                  return `Mcp${this.default(name, 'function')}`
                },
              },
            }),
          ],
        })
    tip: |
      Use `resolver` for naming and file-location tweaks. For changing the AST nodes themselves (e.g. stripping descriptions), use `transformer` instead.
  - name: group
    type: Group
    required: false
    description: |
      Splits generated files into subfolders based on the operation's tag, so each tag in your OpenAPI spec gets its own directory.

      Without `group`, every file lands in the plugin's `output.path` folder. With `group`, files are bucketed under `{output.path}/{groupName}/`, where `groupName` is derived from the operation's first tag.
    tip: |
      Use `group` to mirror your API's domain structure (pet, store, user) in the generated code. Combine it with `output.barrel: { type: 'named', nested: true }` to get per-tag barrel files.

      By default each group becomes a folder. Set `output.mode: 'group'` to collapse each group into a single file (`{output.path}/{groupName}.ts`) instead. `group` is not valid with `output.mode: 'file'` — a single-file output has no grouping concept.
    examples:
      - name: kubb.config.ts
        files:
          - lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    group: { type: 'tag' },
                  }),
                ],
              })
    body: |
      With the configuration above, the generator emits one folder per tag, named after the camelCased tag:

      ```text
      src/gen/
      ├── pet/
      │   ├── AddPet.ts
      │   └── GetPet.ts
      └── store/
          ├── CreateStore.ts
          └── GetStoreById.ts
      ```

      Pass `group.name` to customize the folder name, for example `name: ({ group }) => \`${group}Controller\`` to keep the pre-v5 `petController/` layout.
    properties:
      - name: type
        type: "'tag'"
        required: true
        description: |
          Property used to assign each operation to a group. Required whenever `group` is set.

          Today only `'tag'` is supported: Kubb reads the first tag on the operation (`operation.getTags().at(0)?.name`) and uses it as the group key. Operations without a tag are placed in a default group.
        note: |
          `Required: true*` is conditional — only required when the parent `group` option is used. `group` itself stays optional.
      - name: name
        type: '(context: GroupContext) => string'
        required: false
        default: (ctx) => `${ctx.group}`
        description: Function that builds the folder/identifier name from a group key (the operation's first tag).
  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: |
      Renames parameter properties in the generated MCP handlers. The HTTP layer still uses the original spec names — Kubb adds the mapping for you.
    important: |
      Set the same `paramsCasing` here as on `@kubb/plugin-ts` so the handlers' parameter types line up with the generated request types.
    examples:
      - name: "With `paramsCasing: 'camelcase'`"
        files:
          - lang: typescript
            twoslash: false
            code: |
              // Handler signature uses camelCase
              export async function findPetsByStatusHandler({
                stepId,
              }: {
                stepId: FindPetsByStatusPathParams['stepId']
              }): Promise<CallToolResult> {
                const step_id = stepId

                const res = await fetch({
                  method: 'GET',
                  url: `/pet/findByStatus/${step_id}`,
                })
                // ...
              }
      - name: Without `paramsCasing`
        files:
          - lang: typescript
            twoslash: false
            code: |
              export async function findPetsByStatusHandler({
                step_id,
              }: {
                step_id: FindPetsByStatusPathParams['step_id']
              }): Promise<CallToolResult> {
                const res = await fetch({
                  method: 'GET',
                  url: `/pet/findByStatus/${step_id}`,
                })
                // ...
              }
  - name: client
    type: ClientImportPath & { clientType?, dataReturnType?, baseURL?, bundle?, paramsCasing? }
    required: false
    description: |
      HTTP client used by each MCP handler to call the underlying API. Mirrors a subset of `pluginClient` options.
    properties:
      - name: importPath
        type: string
        required: false
        description: |
          Path or module specifier of a custom client module. Generated code imports its HTTP runtime from here instead of `@kubb/plugin-client/clients/{client}`.

          Use this when you need to inject auth headers, add interceptors, change the base URL at runtime, or wrap a different HTTP library (ky, ofetch, ...). Both relative paths (`./src/client.ts`) and bare specifiers (`@my-org/api-client`) work.
        details:
          - title: When to use `importPath`
            body: |
              Reach for a custom client when you need to:

              - Add an auth token to every request.
              - Plug in interceptors, retries, or logging.
              - Configure `baseURL` and headers from environment variables.
              - Wrap a library other than `axios`/`fetch`.
          - title: Default behavior
            body: |
              Without `importPath`:

              - `bundle: false` (default) — generated code imports from `@kubb/plugin-client/clients/{axios|fetch}`.
              - `bundle: true` — Kubb writes `.kubb/client.ts` and generated code imports from there.
          - title: Required exports
            body: |
              The module pointed to by `importPath` must satisfy the same shape as the built-in client. At minimum:

              - A default export of the `client` function.
              - A `RequestConfig` type.
              - A `ResponseErrorConfig` type.

              When used together with a query plugin (`@kubb/plugin-react-query`, `@kubb/plugin-vue-query`), it must also export a `Client` type alias.
          - title: How generated files import it
            body: |
              Generated code imports the client as a default import (bound to the local name `client`) and the runtime types as named type imports:
            codeBlock:
              lang: typescript
              code: |
                import client from '${client.importPath}'
                import type { RequestConfig, ResponseErrorConfig } from '${client.importPath}'
                // ... rest of the generated file
        important: |
          When used with query plugins (`@kubb/plugin-react-query`, `@kubb/plugin-vue-query`), generated hooks also import a `Client` type alias. Your module **must** export `Client`, `RequestConfig`, and `ResponseErrorConfig` — TypeScript will fail the import otherwise.
        codeBlock:
          lang: typescript
          title: src/client.ts
          code: |
            import axios from 'axios'

            export type RequestConfig<TData = unknown> = {
              url?: string
              method: 'GET' | 'PUT' | 'PATCH' | 'POST' | 'DELETE'
              params?: object
              data?: TData | FormData
              responseType?: 'arraybuffer' | 'blob' | 'document' | 'json' | 'text' | 'stream'
              signal?: AbortSignal
              headers?: HeadersInit
            }

            export type ResponseConfig<TData = unknown> = {
              data: TData
              status: number
              statusText: string
            }

            export type ResponseErrorConfig<TError = unknown> = TError

            // Required when used with @kubb/plugin-react-query or @kubb/plugin-vue-query
            export type Client = <TData, _TError = unknown, TVariables = unknown>(
              config: RequestConfig<TVariables>,
            ) => Promise<ResponseConfig<TData>>

            const client: Client = async (config) => {
              const response = await axios.request<TData>({
                ...config,
                headers: {
                  Authorization: `Bearer ${process.env.API_TOKEN}`,
                  ...config.headers,
                },
              })

              return response
            }

            export default client
        examples:
          - name: Wire up a custom client
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginClient } from '@kubb/plugin-client'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginClient({
                        importPath: './src/client.ts',
                      }),
                    ],
                  })
        tip: |
          See the [custom client guide](https://kubb.dev/plugins/plugin-client#importpath) for a worked example.
      - name: dataReturnType
        type: "'data' | 'full'"
        required: false
        default: "'data'"
        description: |
          Shape of the value returned from each generated client function.

          - `'data'` returns only the response body (`response.data`). Concise and matches what most apps need.
          - `'full'` returns the full response config — body, status code, headers, and the original request. Use this when callers need to inspect headers or status.
        examples:
          - name: "'data' (default)"
            files:
              - name: getPetById.ts
                lang: typescript
                twoslash: false
                code: |
                  export async function getPetById<TData>(
                    petId: GetPetByIdPathParams,
                  ): Promise<ResponseConfig<TData>['data']> {
                    // ...
                  }
              - name: usage.ts
                lang: typescript
                twoslash: false
                code: |
                  const pet = await getPetById(1)
                  //    ^? Pet
          - name: "'full'"
            files:
              - name: getPetById.ts
                lang: typescript
                twoslash: false
                code: |
                  export async function getPetById<TData>(
                    petId: GetPetByIdPathParams,
                  ): Promise<ResponseConfig<TData>> {
                    // ...
                  }
              - name: usage.ts
                lang: typescript
                twoslash: false
                code: |
                  const response = await getPetById(1)
                  //    ^? ResponseConfig<Pet>
                  console.log(response.status, response.headers)
                  const pet = response.data
      - name: baseURL
        type: string
        required: false
        description: |
          Base URL prepended to every request URL in the generated client. When omitted, the URL comes from the OpenAPI spec's `servers[0].url` (or whichever index the adapter is configured to read).

          Set this when the generated client should point at a different environment (staging, production) than the one written in the spec.
        examples:
          - name: Override the spec's server URL
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginClient } from '@kubb/plugin-client'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginClient({
                        baseURL: 'https://petstore.swagger.io/v2',
                      }),
                    ],
                  })
      - name: clientType
        type: "'function' | 'class' | 'staticClass'"
        required: false
        description: |
          Shape of the underlying client the handlers call into. Mirrors `pluginClient`'s `clientType` option.
      - name: bundle
        type: boolean
        required: false
        description: |
          Copies the HTTP client runtime into the generated output so consumers do not need `@kubb/plugin-client` at runtime. Mirrors `pluginClient`'s `bundle` option.
      - name: paramsCasing
        type: "'camelcase'"
        required: false
        description: |
          Renames parameter properties passed to the underlying client. Mirrors `pluginClient`'s `paramsCasing` option.
  - name: include
    type: Array<Include>
    required: false
    description: |
      Restricts generation to operations that match at least one entry in the list. Anything not matched is skipped.

      Each entry filters by one of:

      - `tag` — the operation's first tag in the OpenAPI spec.
      - `operationId` — the operation's `operationId`.
      - `path` — the URL pattern (`'/pet/{petId}'`).
      - `method` — HTTP method (`'get'`, `'post'`, ...).
      - `contentType` — the media type of the request body.

      `pattern` accepts either a string (exact match) or a `RegExp` for fuzzy matches.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Include = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
        }
    examples:
      - name: Only the pet tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    include: [
                      { type: 'tag', pattern: 'pet' },
                    ],
                  }),
                ],
              })
      - name: Only GET operations under /pet
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    include: [
                      { type: 'method', pattern: 'get' },
                      { type: 'path', pattern: /^\/pet/ },
                    ],
                  }),
                ],
              })
  - name: exclude
    type: Array<Exclude>
    required: false
    description: |
      Skips any operation that matches at least one entry in the list. The opposite of `include`.

      Each entry filters by one of:

      - `tag` — the operation's first tag.
      - `operationId` — the operation's `operationId`.
      - `path` — the URL pattern (`'/pet/{petId}'`).
      - `method` — HTTP method (`'get'`, `'post'`, ...).
      - `contentType` — the media type of the request body.

      `pattern` accepts a plain string or a `RegExp`. When both `include` and `exclude` are set, `exclude` wins.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Exclude = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
        }
    examples:
      - name: Skip everything under the store tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    exclude: [
                      { type: 'tag', pattern: 'store' },
                    ],
                  }),
                ],
              })
      - name: Skip a specific operation and all delete methods
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    exclude: [
                      { type: 'operationId', pattern: 'deletePet' },
                      { type: 'method', pattern: 'delete' },
                    ],
                  }),
                ],
              })
  - name: override
    type: Array<Override>
    required: false
    description: |
      Applies a different set of plugin options to operations that match a pattern. Use this when most of your API should follow the global config, but a handful of endpoints need different treatment.

      Each entry has the same `type` and `pattern` shape as `include`/`exclude`, plus an `options` object that overrides the plugin's options for matched operations.

      Entries are evaluated top to bottom. The first matching entry's `options` is merged onto the plugin defaults; later entries do not stack.
    codeBlock:
      lang: typescript
      title: Type definition
      code: |
        export type Override = {
          type: 'tag' | 'operationId' | 'path' | 'method' | 'contentType'
          pattern: string | RegExp
          options: PluginOptions
        }
    examples:
      - name: Use a different enum style for the user tag
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    enumType: 'asConst',
                    override: [
                      {
                        type: 'tag',
                        pattern: 'user',
                        options: { enumType: 'literal' },
                      },
                    ],
                  }),
                ],
              })
  - name: generators
    type: Array<Generator<PluginMcp>>
    required: false
    experimental: true
    description: |
      Adds custom generators that run alongside the plugin's built-in generators. Each generator can emit additional files or post-process existing ones using the plugin's AST and options.

      Use this when you need output the plugin does not produce out of the box (a custom client wrapper, an extra index, a metadata file). For end-to-end guidance, see [Creating plugins](https://kubb.dev/docs/5.x/guides/creating-plugins).
    warning: |
      Generators are an experimental, low-level API. The signature may change between minor releases.
  - name: transformer
    type: Visitor
    required: false
    description: |
      Modifies AST nodes before they are printed to source code. Use this when you need to rewrite operation IDs, drop descriptions, or change schema metadata without forking the generator.

      Each visitor method (e.g. `schema`, `operation`) receives the node and a context object. Return a new node to replace it, or return `undefined` to leave it untouched. Methods you omit keep the plugin's default behavior.
    examples:
      - name: Strip descriptions before printing
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    transformer: {
                      schema(node) {
                        return { ...node, description: undefined }
                      },
                    },
                  }),
                ],
              })
      - name: Prefix every operationId
        files:
          - name: kubb.config.ts
            lang: typescript
            twoslash: false
            code: |
              import { defineConfig } from 'kubb'
              import { pluginTs } from '@kubb/plugin-ts'

              export default defineConfig({
                input: { path: './petStore.yaml' },
                output: { path: './src/gen' },
                plugins: [
                  pluginTs({
                    transformer: {
                      operation(node) {
                        return { ...node, operationId: `api_${node.operationId}` }
                      },
                    },
                  }),
                ],
              })
    tip: |
      Use `transformer` to rewrite node properties before printing. For changing the names of generated symbols and files, use `resolver` instead.
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        twoslash: false
        code: |
          import { defineConfig } from 'kubb'
          import { pluginTs } from '@kubb/plugin-ts'
          import { pluginClient } from '@kubb/plugin-client'
          import { pluginZod } from '@kubb/plugin-zod'
          import { pluginMcp } from '@kubb/plugin-mcp'

          export default defineConfig({
            input: { path: './petStore.yaml' },
            output: { path: './src/gen' },
            plugins: [
              pluginTs(),
              pluginClient(),
              pluginZod(),
              pluginMcp({
                output: { path: 'mcp', barrel: { type: 'named' } },
                client: {
                  baseURL: 'https://petstore.swagger.io/v2',
                },
                group: {
                  type: 'tag',
                  name: ({ group }) => `${group}Handlers`,
                },
              }),
            ],
          })

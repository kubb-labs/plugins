$schema: https://kubb.dev/schemas/extension.json
kind: plugin
id: plugin-swr
name: SWR
description: Generate SWR hooks (useSWR, useSWRMutation) from OpenAPI specifications.
category: framework
type: official
npmPackage: '@kubb/plugin-swr'
docsPath: /plugins/plugin-swr
repo: https://github.com/kubb-labs/plugins
maintainers:
  - name: Stijn Van Hulle
    github: stijnvanhulle
compatibility:
  kubb: '>=5.0.0'
  node: '>=22'
tags:
  - swr
  - react
  - hooks
  - data-fetching
  - codegen
  - openapi
dependencies:
  - plugin-ts
  - plugin-client
resources:
  documentation: https://kubb.dev/plugins/plugin-swr
  repository: https://github.com/kubb-labs/plugins
  issues: https://github.com/kubb-labs/plugins/issues
  changelog: https://github.com/kubb-labs/plugins/blob/main/packages/plugin-swr/CHANGELOG.md
  codesandbox: https://codesandbox.io/p/github/kubb-labs/plugins/main/examples/swr
featured: true
intro: |
  # @kubb/plugin-swr

  Generate type-safe SWR hooks from your OpenAPI schema for data fetching, caching, and mutations.
options:
  - name: output
    type: Output
    required: false
    default: "{ path: 'hooks', barrel: { type: 'named' } }"
    description: Specify the export location for the files and define the behavior of the output.
    properties:
      - name: path
        type: string
        required: true
        description: |
          Folder where the plugin writes its generated code. The path is resolved against the global `output.path` set on `defineConfig`.

          Use a folder to keep each generator's output isolated (`'types'`, `'clients'`, `'hooks'`). To put everything in one file, set `output.mode: 'file'` and point `path` at the target file including its extension (e.g. `'types.ts'`).
        tip: |
          `output.path` sets where files go, `output.mode` sets how many. See `output.mode` for the single-file and one-file-per-group layouts.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { path: './types' },
                      }),
                    ],
                  })
          - name: Resulting tree
            files:
              - lang: text
                twoslash: false
                code: |
                  src/
                  └── gen/
                      └── types/
                          ├── Pet.ts
                          └── Store.ts
        default: "'hooks'"
      - name: mode
        type: "'directory' | 'group' | 'file'"
        required: false
        default: "'directory'"
        description: |
          How the plugin consolidates its generated code into files.

          - `'directory'` writes one file per operation or schema under `output.path`. This is the default.
          - `'group'` writes one file per resolved group and needs the `group` option set.
          - `'file'` writes everything into a single file. The `output.path` must include the file extension (e.g. `'types.ts'`, `'models.py'`).
        tip: |
          `mode: 'group'` requires the sibling `group` option. Setting it without `group` stops the build with a `KUBB_INVALID_PLUGIN_OPTIONS` error. `mode: 'file'` forbids `group` — a single-file output has nothing to group.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'
                  import { pluginClient } from '@kubb/plugin-client'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { path: 'types.ts', mode: 'file' },
                      }),
                      pluginClient({
                        output: { path: 'clients', mode: 'group' },
                        group: { type: 'tag' },
                      }),
                    ],
                  })
          - name: Resulting tree
            files:
              - lang: text
                twoslash: false
                code: |
                  src/
                  └── gen/
                      ├── types.ts
                      └── clients/
                          ├── pet.ts
                          └── store.ts
      - name: barrel
        type: "{ type: 'named' | 'all', nested?: boolean } | false"
        required: false
        default: "{ type: 'named' }"
        description: |
          Controls how the generated `index.ts` (barrel) file re-exports the plugin's output.

          - `{ type: 'named' }` re-exports each symbol by name. Best for tree-shaking and explicit imports.
          - `{ type: 'all' }` uses `export *`. Smaller barrel file, but exports everything.
          - `{ nested: true }` creates a barrel in every subdirectory, so callers can import from any depth.
          - `false` skips the barrel entirely. The plugin's files are also excluded from the root `index.ts`.
        tip: |
          Pick `'named'` when consumers care about which symbols they import (better tree-shaking, friendlier auto-import). Pick `'all'` when the file count is small and you want a one-line barrel.
        examples:
          - name: "'named' (default)"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export { Pet, PetStatus } from './Pet'
                  export { Store } from './Store'
          - name: "'all'"
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'all' } },
                      }),
                    ],
                  })
              - name: src/gen/types/index.ts
                lang: typescript
                twoslash: false
                code: |
                  export * from './Pet'
                  export * from './Store'
          - name: nested
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: { type: 'named', nested: true } },
                      }),
                    ],
                  })
              - name: Generated tree
                lang: text
                twoslash: false
                code: |
                  src/gen/types/
                  ├── index.ts          # re-exports ./pet and ./store
                  ├── pet/
                  │   ├── index.ts      # re-exports Pet, Store, ...
                  │   └── Pet.ts
                  └── store/
                      ├── index.ts
                      └── Store.ts
          - name: 'false'
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { barrel: false },
                      }),
                    ],
                  })
              - name: Result
                lang: text
                twoslash: false
                code: |
                  # No index.ts is generated for this plugin.
                  # Its files are also excluded from the root index.ts.
      - name: banner
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text prepended to every generated file. Useful for license headers, lint disables, or `@ts-nocheck` directives.

          Pass a string for a static banner. Pass a function to compute the banner from each file's `RootNode` (the AST root containing path, schema, and operation context).
        examples:
          - name: Static banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */\n// @ts-nocheck',
                        },
                      }),
                    ],
                  })
              - name: Generated file
                lang: typescript
                twoslash: false
                code: |
                  /* eslint-disable */
                  // @ts-nocheck
                  export type Pet = {
                    id: number
                    name: string
                  }
          - name: Dynamic banner
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: (node) => `// Source: ${node.path}\n// Generated at ${new Date().toISOString()}`,
                        },
                      }),
                    ],
                  })
      - name: footer
        type: 'string | ((node: RootNode) => string)'
        required: false
        description: |
          Text appended at the end of every generated file. The mirror of `banner` — use it for closing comments, re-enabling lint rules, or marker lines.

          Pass a string for a static footer, or a function that receives the file's `RootNode` and returns the footer text.
        examples:
          - name: Re-enable lint after a banner disable
            files:
              - name: kubb.config.ts
                lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: {
                          banner: '/* eslint-disable */',
                          footer: '/* eslint-enable */',
                        },
                      }),
                    ],
                  })
      - name: override
        type: boolean
        required: false
        default: 'false'
        description: |
          Allows the plugin to overwrite hand-written files that share a name with a generated file.

          - `false` (default): Kubb skips a file if it already exists and is not marked as generated. This protects manual edits.
          - `true`: Kubb overwrites any file at the target path, including hand-written ones.
        warning: |
          Enable this only when you are sure the target folder contains nothing you need to keep. Local edits are lost on the next generation.
        examples:
          - name: kubb.config.ts
            files:
              - lang: typescript
                twoslash: false
                code: |
                  import { defineConfig } from 'kubb'
                  import { pluginTs } from '@kubb/plugin-ts'

                  export default defineConfig({
                    input: { path: './petStore.yaml' },
                    output: { path: './src/gen' },
                    plugins: [
                      pluginTs({
                        output: { override: true },
                      }),
                    ],
                  })
  - name: group
    type: Group
    required: false
    description: Grouping combines files in a folder based on a specific `type`.
  - name: client
    type: ClientImportPath & { clientType?, dataReturnType?, baseURL?, bundle?, paramsCasing? }
    required: false
    description: Client configuration for HTTP request generation.
  - name: paramsType
    type: "'object' | 'inline'"
    required: false
    default: "'inline'"
    description: Defines how parameters are passed to generated functions.
  - name: paramsCasing
    type: "'camelcase'"
    required: false
    description: Transform parameter names to a specific casing format.
  - name: pathParamsType
    type: "'object' | 'inline'"
    required: false
    default: "'inline'"
    description: Defines how pathParams are passed to generated functions.
  - name: parser
    type: false | 'zod'
    required: false
    default: false
    description: |
      Runtime validator applied to the response body before it is returned.

      - `false` (default) — no validation; the response is cast to the generated type.
      - `'zod'` — pipes the response through the Zod schema from `@kubb/plugin-zod`.
  - name: query
    type: Query
    required: false
    description: |
      Override some `useSWR` behaviors. Pass `false` to disable query hook generation.
    codeBlock:
      lang: typescript
      title: Query
      code: |
        type Query = {
          methods: Array<HttpMethod>
          importPath?: string
        } | false
    properties:
      - name: methods
        type: Array<HttpMethod>
        required: false
        default: "['get']"
        description: Define which HttpMethods can be used for queries.
      - name: importPath
        type: string
        required: false
        default: "'swr'"
        description: Path to the `useSWR` import.
  - name: queryKey
    type: '(props: { operation: Operation; schemas: OperationSchemas }) => unknown[]'
    required: false
    description: Customize the queryKey that will be used for the query.
  - name: mutation
    type: Mutation
    required: false
    description: |
      Override some `useSWRMutation` behaviors. Pass `false` to disable mutation hook generation.
    codeBlock:
      lang: typescript
      title: Mutation
      code: |
        type Mutation = {
          methods: Array<HttpMethod>
          importPath?: string
        } | false
    properties:
      - name: methods
        type: Array<HttpMethod>
        required: false
        default: "['post', 'put', 'patch', 'delete']"
        description: Define which HttpMethods can be used for mutations.
      - name: importPath
        type: string
        required: false
        default: "'swr/mutation'"
        description: Path to the `useSWRMutation` import.
  - name: mutationKey
    type: '(props: { operation: Operation; schemas: OperationSchemas }) => unknown[]'
    required: false
    description: Customize the mutationKey.
  - name: include
    type: Array<Include>
    required: false
    description: Array containing include parameters.
  - name: exclude
    type: Array<Exclude>
    required: false
    description: Array containing exclude parameters.
  - name: override
    type: Array<Override>
    required: false
    description: Array containing override parameters.
  - name: generators
    type: Array<Generator<PluginSwr>>
    required: false
    experimental: true
    description: Define additional generators next to the built-in generators.
  - name: resolver
    type: Partial<ResolverSwr> & ThisType<ResolverSwr>
    required: false
    description: Override naming conventions for function names and types.
  - name: transformer
    type: Visitor
    required: false
    description: AST visitor to transform generated nodes.
notes:
  - type: tip
    body: |
      See [SWR](https://swr.vercel.app) for more information about SWR.
examples:
  - name: kubb.config.ts
    files:
      - lang: typescript
        code: |
          import { defineConfig } from 'kubb'
          import { pluginTs } from '@kubb/plugin-ts'
          import { pluginSwr } from '@kubb/plugin-swr'

          export default defineConfig({
            input: {
              path: './petStore.yaml',
            },
            output: {
              path: './src/gen',
            },
            plugins: [
              pluginTs(),
              pluginSwr({
                output: {
                  path: './hooks',
                },
                group: {
                  type: 'tag',
                  name: ({ group }) => `${group}Hooks`,
                },
                client: {
                  dataReturnType: 'data',
                },
                mutation: {
                  methods: ['post', 'put', 'delete'],
                },
                query: {
                  methods: ['get'],
                  importPath: 'swr',
                },
              }),
            ],
          })
        twoslash: false
